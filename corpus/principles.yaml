- id: prin_001
  principle: Every B1/B2 applicant is presumed to be an intending immigrant and bears
    the burden of proving they qualify for nonimmigrant status.
  source_layer: official
  source_ids:
  - off_fam_005
  - off_fam_007
  validation_status: passed
  confidence: high
  applies_to_categories:
  - immigrant_intent
  - burden_of_proof
- id: prin_002
  principle: The most common reason B1/B2 applicants are refused is failure to overcome
    the presumption of immigrant intent under INA 214(b).
  source_layer: official
  source_ids:
  - off_fam_006
  - off_fam_015
  validation_status: passed
  confidence: high
  applies_to_categories:
  - immigrant_intent
  - refusal_grounds
- id: prin_003
  principle: A refusal under INA 214(b) is not a permanent bar; the applicant may
    reapply and establish eligibility on a new application.
  source_layer: official
  source_ids:
  - off_fam_009
  - off_fam_013
  validation_status: passed
  confidence: high
  applies_to_categories:
  - refusal_grounds
  - reapplication
- id: prin_004
  principle: A 214(b) denial for a B visa occurs specifically when the applicant fails
    to demonstrate the intent not to abandon a foreign residence.
  source_layer: official
  source_ids:
  - off_fam_012
  validation_status: passed
  confidence: high
  applies_to_categories:
  - ties_to_home
  - immigrant_intent
  - refusal_grounds
- id: prin_005
  principle: INA 214(b) does not simply require applicants to show 'ties' to their
    home country; it requires them to fully qualify for the nonimmigrant visa classification.
  source_layer: official
  source_ids:
  - off_fam_015
  validation_status: passed
  confidence: high
  applies_to_categories:
  - ties_to_home
  - immigrant_intent
- id: prin_006
  principle: There is no waiver available for a refusal under INA 214(b); the only
    path forward is to overcome it on a subsequent application.
  source_layer: official
  source_ids:
  - off_fam_018
  validation_status: passed
  confidence: high
  applies_to_categories:
  - refusal_grounds
  - reapplication
- id: prin_007
  principle: If a consular officer is not satisfied that an applicant meets the standards
    of the visa classification, the applicant must be refused under INA 214(b) even
    if they have convinced the officer they are not an intending immigrant.
  source_layer: official
  source_ids:
  - off_fam_016
  validation_status: passed
  confidence: high
  applies_to_categories:
  - immigrant_intent
  - refusal_grounds
- id: prin_008
  principle: When an applicant is ineligible under both INA 214(b) and a permanent
    ground of ineligibility, the consular officer must record all applicable grounds
    of refusal.
  source_layer: official
  source_ids:
  - off_fam_010
  validation_status: passed
  confidence: high
  applies_to_categories:
  - refusal_grounds
- id: prin_009
  principle: The qualification standards for a B1/B2 visa are found in INA 101(a)(15)
    and corresponding regulations, not in INA 214(b) itself.
  source_layer: official
  source_ids:
  - off_fam_011
  validation_status: passed
  confidence: high
  applies_to_categories:
  - legal_framework
- id: prin_010
  principle: The most important factor in a B1/B2 visa decision is whether the consular
    officer is convinced the applicant will use the visa for its intended purpose.
  source_layer: practitioner
  source_ids:
  - prac_003_00
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - purpose_of_visit
  - credibility
- id: prin_011
  principle: Applicants must convincingly show they will return to their home country
    after the trip, will not accept work in the U.S., and will actually do what they
    claim they will be doing.
  source_layer: practitioner
  source_ids:
  - prac_003_01
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - ties_to_home
  - purpose_of_visit
  - immigrant_intent
- id: prin_012
  principle: Recent job loss can negatively affect a B1/B2 visa application because
    it weakens evidence of ties to the home country.
  source_layer: practitioner
  source_ids:
  - prac_003_03
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - ties_to_home
  - employment
- id: prin_013
  principle: Consular officers routinely ask about the purpose of the trip, who will
    accompany the applicant, how the trip will be funded, and how long the applicant
    intends to stay.
  source_layer: practitioner
  source_ids:
  - prac_003_04
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - purpose_of_visit
  - finances
  - interview_questions
- id: prin_014
  principle: Consular officers may ask about past U.S. travel history, the location
    and identity of family members, the applicant's education level, and current employment.
  source_layer: practitioner
  source_ids:
  - prac_003_05
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - travel_history
  - ties_to_home
  - employment
  - interview_questions
- id: prin_015
  principle: Consular officers have access to substantial data about applicants, and
    dishonesty about past U.S. immigration history will almost certainly result in
    visa denial.
  source_layer: practitioner
  source_ids:
  - prac_003_06
  - prac_003_07
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - credibility
  - travel_history
- id: prin_016
  principle: The average B1/B2 visa interview lasts approximately three minutes, making
    every answer critically important.
  source_layer: practitioner
  source_ids:
  - prac_003_08
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - interview_format
- id: prin_017
  principle: Because interviews are very short, consular officers rely heavily on
    the interview itself to assess applicant credibility and qualifications rather
    than on documents alone.
  source_layer: practitioner
  source_ids:
  - prac_003_09
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - credibility
  - interview_format
- id: prin_018
  principle: B-2 visitors are generally admitted to the United States for an initial
    period of six months.
  source_layer: practitioner
  source_ids:
  - prac_001_00
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - admission_period
- id: prin_019
  principle: Port of entry officers can reduce the admission period below six months
    based on the purpose of the visit, U.S. travel history, and other factors.
  source_layer: practitioner
  source_ids:
  - prac_001_01
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - admission_period
  - travel_history
- id: prin_020
  principle: B-2 applicants must demonstrate that their U.S. visit is purely temporary
    and limited to activities permitted under the B-2 classification.
  source_layer: practitioner
  source_ids:
  - prac_001_02
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - purpose_of_visit
  - immigrant_intent
- id: prin_021
  principle: B-2 applicants seeking medical treatment must provide documentation of
    the need for treatment in the United States and proof of the financial ability
    to pay for that treatment.
  source_layer: practitioner
  source_ids:
  - prac_001_03
  validation_status: passed
  confidence: medium
  applies_to_categories:
  - purpose_of_visit
  - finances
  - medical_treatment
