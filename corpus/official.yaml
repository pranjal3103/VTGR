  section: ''
  paragraph_anchor: p_126
  text: "c.�(U) Evidence of English Language\r\nCompetence in Some Cases:�Applicants\
    \ were allowed to take the 1977 Visa\r\nQualifying Exam (VQE) (the first time\
    \ it was given) without first demonstrating\r\ncompetence in oral and written\
    \ English.� This is also true of the 1982 and 1983\r\nVQE.� In 1978, 1979, 1980,\
    \ and 1981, however, an applicant had to demonstrate\r\nthe requisite competence\
    \ to be allowed to take the VQE.� Thus, an applicant who\r\ntook the 1978, 1979,\
    \ 1980, or 1981 VQE is presumed to have met the requirement\r\nfor competence\
    \ in oral and written English, while an applicant who took the\r\n1977, 1982,\
    \ or 1983 VQE will have to present separate evidence that the\r\napplicant meets\
    \ the oral and written English competence requirement.�"
  retrieved_at: '2026-05-22'
