- id: off_ina_001
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_1
  text: (1) The admission to the United States of any alien as a nonimmigrant shall
    be for such time and under such conditions as the Attorney General may by regulations
    prescribe, including when he deems necessary the giving of a bond with sufficient
    surety in such sum and containing such conditions as the Attorney General shall
    prescribe, to insure that at the expiration of such time or upon failure to maintain
    the status under which he was admitted, or to maintain any status subsequently
    acquired undersection 1258 of this title, such alien will depart from the United
    States. No alien admitted to Guam or the Commonwealth of the Northern Mariana
    Islands without a visa pursuant tosection 1182(l) of this titlemay be authorized
    to enter or stay in the United States other than in Guam or the Commonwealth of
    the Northern Mariana Islands or to remain in Guam or the Commonwealth of the Northern
    Mariana Islands for a period exceeding 45 days from date of admission to Guam
    or the Commonwealth of the Northern Mariana Islands. No alien admitted to the
    United States without a visa pursuant tosection 1187 of this titlemay be authorized
    to remain in the United States as a nonimmigrant visitor for a period exceeding
    90 days from the date of admission.
  retrieved_at: '2026-05-22'
- id: off_ina_002
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_2
  text: (2)(A) The period of authorized status as a nonimmigrant described insection
    1101(a)(15)(O) of this titleshall be for such period as the Attorney General may
    specify in order to provide for the event (or events) for which the nonimmigrant
    is admitted.
  retrieved_at: '2026-05-22'
- id: off_ina_003
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_3
  text: (B) The period of authorized status as a nonimmigrant described insection
    1101(a)(15)(P) of this titleshall be for such period as the Attorney General may
    specify in order to provide for the competition, event, or performance for which
    the nonimmigrant is admitted. In the case of nonimmigrants admitted as individual
    athletes undersection 1101(a)(15)(P) of this title, the period of authorized status
    may be for an initial period (not to exceed 5 years) during which the nonimmigrant
    will perform as an athlete and such period may be extended by the Attorney General
    for an additional period of up to 5 years.
  retrieved_at: '2026-05-22'
- id: off_ina_004
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_4
  text: Every alien (other than a nonimmigrant described in subparagraph (L) or (V)
    ofsection 1101(a)(15) of this title, and other than a nonimmigrant described in
    any provision ofsection 1101(a)(15)(H)(i) of this titleexcept subclause (b1) of
    such section) shall be presumed to be an immigrant until he establishes to the
    satisfaction of the consular officer, at the time of application for a visa, and
    the immigration officers, at the time of application for admission, that he is
    entitled to a nonimmigrant status undersection 1101(a)(15) of this title. An alien
    who is an officer or employee of any foreign government or of any international
    organization entitled to enjoy privileges, exemptions, and immunities under the
    International Organizations Immunities Act [22 U.S.C. 288 et seq.], or an alien
    who is the attendant, servant, employee, or member of the immediate family of
    any such alien shall not be entitled to apply for or receive an immigrant visa,
    or to enter the United States as an immigrant unless he executes a written waiver
    in the same form and substance as is prescribed bysection 1257(b) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_005
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_5
  text: (1) The question of importing any alien as a nonimmigrant under subparagraph
    (H), (L), (O), or (P)(i) ofsection 1101(a)(15) of this title(excluding nonimmigrants
    undersection 1101(a)(15)(H)(i)(b1) of this title) in any specific case or specific
    cases shall be determined by the Attorney General, after consultation with appropriate
    agencies of the Government, upon petition of the importing employer. Such petition,
    shall be made and approved before the visa is granted. The petition shall be in
    such form and contain such information as the Attorney General shall prescribe.
    The approval of such a petition shall not, of itself, be construed as establishing
    that the alien is a nonimmigrant. For purposes of this subsection with respect
    to nonimmigrants described insection 1101(a)(15)(H)(ii)(a) of this title, the
    term "appropriate agencies of Government" means the Department of Labor and includes
    the Department of Agriculture. The provisions ofsection 1188 of this titleshall
    apply to the question of importing any alien as a nonimmigrant undersection 1101(a)(15)(H)(ii)(a)
    of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_006
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_6
  text: (2)(A) The Attorney General shall provide for a procedure under which an importing
    employer which meets requirements established by the Attorney General may file
    a blanket petition to import aliens as nonimmigrants described insection 1101(a)(15)(L)
    of this titleinstead of filing individual petitions under paragraph (1) to import
    such aliens. Such procedure shall permit the expedited processing of visas for
    admission of aliens covered under such a petition.
  retrieved_at: '2026-05-22'
- id: off_ina_007
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_7
  text: (B) For purposes ofsection 1101(a)(15)(L) of this title, an alien is considered
    to be serving in a capacity involving specialized knowledge with respect to a
    company if the alien has a special knowledge of the company product and its application
    in international markets or has an advanced level of knowledge of processes and
    procedures of the company.
  retrieved_at: '2026-05-22'
- id: off_ina_008
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_8
  text: (C) The Attorney General shall provide a process for reviewing and acting
    upon petitions under this subsection with respect to nonimmigrants described insection
    1101(a)(15)(L) of this titlewithin 30 days after the date a completed petition
    has been filed.
  retrieved_at: '2026-05-22'
- id: off_ina_009
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_9
  text: (i) a nonimmigrant admitted to render services in a managerial or executive
    capacity undersection 1101(a)(15)(L) of this titleshall not exceed 7 years, or
  retrieved_at: '2026-05-22'
- id: off_ina_010
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_10
  text: (ii) a nonimmigrant admitted to render services in a capacity that involves
    specialized knowledge undersection 1101(a)(15)(L) of this titleshall not exceed
    5 years.
  retrieved_at: '2026-05-22'
- id: off_ina_011
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_11
  text: (E) In the case of an alien spouse admitted undersection 1101(a)(15)(L) of
    this title, who is accompanying or following to join a principal alien admitted
    under such section, the Attorney General shall authorize the alien spouse to engage
    in employment in the United States and provide the spouse with an "employment
    authorized" endorsement or other appropriate work permit.
  retrieved_at: '2026-05-22'
- id: off_ina_012
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_12
  text: (F) An alien who will serve in a capacity involving specialized knowledge
    with respect to an employer for purposes ofsection 1101(a)(15)(L) of this titleand
    will be stationed primarily at the worksite of an employer other than the petitioning
    employer or its affiliate, subsidiary, or parent shall not be eligible for classification
    undersection 1101(a)(15)(L) of this titleif-
  retrieved_at: '2026-05-22'
- id: off_ina_013
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_13
  text: (i) the alien will be controlled and supervised principally by such unaffiliated
    employer; or
  retrieved_at: '2026-05-22'
- id: off_ina_014
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_14
  text: (ii) the placement of the alien at the worksite of the unaffiliated employer
    is essentially an arrangement to provide labor for hire for the unaffiliated employer,
    rather than a placement in connection with the provision of a product or service
    for which specialized knowledge specific to the petitioning employer is necessary.
  retrieved_at: '2026-05-22'
- id: off_ina_015
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_15
  text: (A) with respect to a nonimmigrant described insection 1101(a)(15)(O)(i) of
    this titleonly after consultation in accordance with paragraph (6) or, with respect
    to aliens seeking entry for a motion picture or television production, after consultation
    with the appropriate union representing the alien's occupational peers and a management
    organization in the area of the alien's ability, or
  retrieved_at: '2026-05-22'
- id: off_ina_016
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_16
  text: (B) with respect to a nonimmigrant described insection 1101(a)(15)(O)(ii)
    of this titleafter consultation in accordance with paragraph (6) or, in the case
    of such an alien seeking entry for a motion picture or television production,
    after consultation with such a labor organization and a management organization
    in the area of the alien's ability.
  retrieved_at: '2026-05-22'
- id: off_ina_017
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_17
  text: In the case of an alien seeking entry for a motion picture or television production,
    (i) any opinion under the previous sentence shall only be advisory, (ii) any such
    opinion that recommends denial must be in writing, (iii) in making the decision
    the Attorney General shall consider the exigencies and scheduling of the production,
    and (iv) the Attorney General shall append to the decision any such opinion. The
    Attorney General shall provide by regulation for the waiver of the consultation
    requirement under subparagraph (A) in the case of aliens who have been admitted
    as nonimmigrants undersection 1101(a)(15)(O)(i) of this titlebecause of extraordinary
    ability in the arts and who seek readmission to perform similar services within
    2 years after the date of a consultation under such subparagraph. Not later than
    5 days after the date such a waiver is provided, the Attorney General shall forward
    a copy of the petition and all supporting documentation to the national office
    of an appropriate labor organization.
  retrieved_at: '2026-05-22'
