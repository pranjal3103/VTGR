  section: ''
  paragraph_anchor: p_230
  text: Section 4605(j)(1)(A) of title 50, referred to in subsec. (c)(4)(F)(iii)(I),
    was repealed byPub. L. 115–232,div. A, title XVII, §1766(a), Aug. 13, 2018,132
    Stat. 2232. Provisions similar to those in formersection 4605(j)(1)(A) of title
    50can be found insection 4813(c)(1)(A)(i) of title 50, as enacted byPub. L. 115–232.
  retrieved_at: '2026-05-22'
