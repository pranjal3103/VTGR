  section: ''
  paragraph_anchor: p_123
  text: "e.(U) Special Provisions for Certain\r\nForeign Medical Graduates:� Special\
    \ provisions have been enacted by the\r\nCongress relating to foreign medical\
    \ graduates (FMG’s) in the United\r\nStates as of January 9, 1978.� An FMG who,\
    \ as of that date, was both fully and\r\npermanently licensed to practice medicine\
    \ in a State of the United States (as\r\ndefined in INA 101(a)(36)) and practicing\
    \ medicine in a State is considered to\r\nhave passed Parts I and II of the NBME\
    \ Examination.�"
  retrieved_at: '2026-05-22'
