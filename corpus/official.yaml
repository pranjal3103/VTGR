  section: ''
  paragraph_anchor: p_445
  text: Pub. L. 85–531,July 18, 1958,72 Stat. 375, authorized the Attorney General,
    upon application made not later than July 18, 1963, to cancel any departure bond
    posted pursuant to the Immigration Act of 1924, as amended, or the Immigration
    and Nationality Act [this chapter], on behalf of any refugee who entered the United
    States as a nonimmigrant after May 6, 1945, and prior to July 1, 1953, and who
    had his immigration status adjusted to that of an alien admitted for permanent
    residence pursuant to any public or private law.
