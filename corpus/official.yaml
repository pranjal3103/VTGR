  text: "b.(U) Graduating from Accredited\r\nMedical School:� An applicant may meet\
    \ the requirements of INA\r\n212(a)(5)(B) by establishing that the medical school\
    \ from which they graduated\r\nhas been accredited by a body authorized to do\
    \ so by the Secretary of\r\nEducation.� The only body so authorized is the Liaison\
    \ Committee for Medical\r\nEducation (LCME).� The LCME was founded in 1942 and\
    \ has confined itself to\r\nevaluating and accrediting medical schools in the\
    \ United States and Canada.� In\r\nthis connection, any case involving an applicant\
    \ who graduated from a medical\r\nschool in Canada or the United States before\
    \ the accreditation system began in\r\n1942 will require individual verification\
    \ of the status of the medical school\r\nas of the time the applicant graduated.�"
  retrieved_at: '2026-05-22'
- id: off_fam_120
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_120
  text: "(1)�(U) NBME Examination Applicable\r\nto U.S. and Canadian Medical Schools:�\
    \ The policy of the NBME is that\r\nonly students at, or graduates of, U.S. or\
    \ Canadian medical schools are\r\neligible to take the NBME Part I and Part II\
    \ Examination. See9 FAM 302.1-6(B)(2)paragraph c(2) below concerning the American\
    \ University Medical\r\nSchool at Beirut.� The NBME exam (and the FMGES) have\
    \ been replaced by the\r\nUnited States Medical Licensing Examination (USMLE).�"
  retrieved_at: '2026-05-22'
- id: off_fam_121
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_121
  text: "(2)�(U) NBME Examination at American\r\nUniversity in Beirut Before 1982:�\
    \ Although the American University\r\nMedical School in Beirut, Lebanon is not\
    \ a U.S. or Canadian medical school,\r\nthrough 1982 it had a special relationship\
    \ with American education authorities\r\nunder which its graduates were permitted\
    \ to take the NBME Examination.� Medical\r\nstudents took Part I of the Examination\
    \ in the next-to-last year of study and\r\nPart II shortly after graduation.�\
    \ This arrangement was terminated in 1982 and\r\ngraduates thereafter will not\
    \ have taken the examination.�"
  retrieved_at: '2026-05-22'
- id: off_fam_122
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_122
  text: "d.(U) Examinations Equivalent to NBME\r\nExamination:� In 1992, the Federation\
    \ of State Medical Boards and the\r\nNational Board of Medical Examiners announced\
    \ that all licensure programs would\r\nbe replaced by the United States Medical\
    \ Licensing Examination (USMLE).� This\r\nexamination has been determined by the\
    \ Secretary of Health and Human Services\r\nto be the equivalent of Parts I and\
    \ II of the NBME under INA 212(a)(5)(B).��"
  retrieved_at: '2026-05-22'
