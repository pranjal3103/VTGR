  section: ''
  paragraph_anchor: p_236
  text: 'Pub. L. 116–113,§503(c)(1)(A), (B), redesignated par. (2) as (1) and struck
    out former par. (1) which read as follows: "Notwithstanding any other provision
    of this chapter, an alien who is a citizen of Canada and seeks to enter the United
    States under and pursuant to the provisions of Annex 1502.1 (United States of
    America), Part C-Professionals, of the United States-Canada Free-Trade Agreement
    to engage in business activities at a professional level as provided for therein
    may be admitted for such purpose under regulations of the Attorney General promulgated
    after consultation with the Secretaries of State and Labor."'
