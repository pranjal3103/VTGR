    the beginning of subtitle B of title III ofPub. L. 116–113 andrenumbering it as
    section 311. Section 503(b)(4) ofPub. L. 116–113subsequently repealed subsecs.
    (b) and (c) of the renumbered section 311. The amendments by section 503(b)(1)–(3)
    ofPub. L. 116–113resulted in no change to the text of this section. See source
    credits above.
