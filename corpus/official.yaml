    \ documents.� Therefore, if you, based upon the interview or an\r\ninvestigation,\
    \ have reason to doubt whether the applicant possesses such\r\nskills, training,\
    \ experience, or other qualifications, you have a\r\nresponsibility to resolve\
    \ such doubts.� See9 FAM 302.1-5(B)(10)below.� The\r\nDOL has stressed that experience\
