  section: ''
  paragraph_anchor: p_427
  text: 'Pub. L. 101–649,title II, §207(c), Nov. 29, 1990,104 Stat. 5026, as amended
    byPub. L. 102–232,title III, §303(a)(13), Dec. 12, 1991,105 Stat. 1748, provided
    that:'
  retrieved_at: '2026-05-22'
- id: off_ina_428
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_428
  text: '"(1) In the case of an alien admitted as a nonimmigrant (other than under
    section 101(a)(15)(H)(ii)(a) of the Immigration and Nationality Act [8 U.S.C.
    1101(a)(15)(H)(ii)(a)]) and who is authorized to be employed in an occupation,
    if nonimmigrants constitute a majority of the members of the bargaining unit in
    the occupation, during the period of any strike or lockout in the occupation with
    the employer which strike or lockout is pending on the date of the enactment of
    this Act [Nov. 29, 1990] the alien-'
  retrieved_at: '2026-05-22'
- id: off_ina_429
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_429
  text: '"(A) continues to be authorized to be employed in the occupation for that
    employer, and'
  retrieved_at: '2026-05-22'
- id: off_ina_430
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_430
  text: '"(B) is authorized to be employed in any occupation for any other employer
    so long as such strike or lockout continues with respect to that occupation and
    employer.'
  retrieved_at: '2026-05-22'
- id: off_ina_431
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_431
  text: '"(2) In the case of an alien admitted as a nonimmigrant (other than under
    section 101(a)(15)(H)(ii)(a) of the Immigration and Nationality Act) and who is
    authorized to be employed in an occupation, if nonimmigrants do not constitute
    a majority of the members of the bargaining unit in the occupation, during the
    period of any strike or lockout in the occupation with the employer which strike
    or lockout is pending on the date of the enactment of this Act the alien-'
  retrieved_at: '2026-05-22'
- id: off_ina_432
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_432
  text: '"(B) is authorized to be employed in any occupation for any other employer
    so long as there is no strike or lockout with respect to that occupation and employer.'
  retrieved_at: '2026-05-22'
- id: off_ina_433
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_433
  text: '"(3) With respect to a nonimmigrant described in paragraph (1) or (2) who
    does not perform unauthorized employment, any limit on the period of authorized
    stay shall be extended by the period of the strike or lockout, except that any
    such extension may not continue beyond the maximum authorized period of stay.'
  retrieved_at: '2026-05-22'
