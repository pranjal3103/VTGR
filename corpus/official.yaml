  text: 2020-Subsec. (e)(1).Pub. L. 116–113,§503(c)(1)(C), substituted "Annex 16–A
    of the USMCA (as defined insection 4502 of title 19)" for "Annex 1603 of the North
    American Free Trade Agreement (in this subsection referred to as 'NAFTA')" and
    "For purposes of this paragraph, the term 'citizen of Mexico' means 'citizen'
    as defined in article 16.1 of the USMCA." for "The admission of an alien who is
    a citizen of Mexico shall be subject to paragraphs (3), (4), and (5). For purposes
    of this paragraph and paragraphs (3), (4), and (5), the term 'citizen of Mexico'
    means 'citizen' as defined in Annex 1608 of NAFTA."
