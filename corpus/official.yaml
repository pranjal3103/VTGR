    \ the effective\r\nadministration of the immigration laws, you have the discretionary\
    \ authority to\r\nrecommend to the Deputy Assistant Secretary for Visa Services\
    \ (VO DAS) that\r\nexceptional circumstances be found in the individual case.�\
    \ In determining\r\nwhether to make a favorable recommendation to the VO DAS,\
    \ keep in mind that\r\nextraordinary circumstances shall not be found based on\
    \ convenience or\r\nfinancial burden to the applicant, the applicant's relative,\
    \ or the applicant's\r\nemployer.� If the VO DAS determines that extraordinary\
    \ circumstances exist, an\r\nindividual exception will be granted."
  retrieved_at: '2026-05-22'
