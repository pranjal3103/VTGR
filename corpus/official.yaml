  section: ''
  paragraph_anchor: p_231
  text: This chapter, referred to in subsecs. (c)(4)(H), (e), and (j), was in the
    original, "this Act", meaning actJune 27, 1952, ch. 477,66 Stat. 163, known as
    the Immigration and Nationality Act, which is classified principally to this chapter.
    For complete classification of this Act to the Code, see Short Title note set
    out undersection 1101 of this titleand Tables.
  retrieved_at: '2026-05-22'
