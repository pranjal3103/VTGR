  section: ''
  paragraph_anchor: p_425
  text: 'Pub. L. 102–232,title II, §207(c)(2), Dec. 12, 1991,105 Stat. 1742, provided
    that: "The first report under section 214(c)(8) of the Immigration and Nationality
    Act [8 U.S.C. 1184(c)(8)] shall be provided not later than April 1, 1993."'
  retrieved_at: '2026-05-22'
