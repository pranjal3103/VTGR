- id: off_ina_388
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_388
  text: 'Pub. L. 119–75,div. I, §5016, Feb. 3, 2026,140 Stat. 631, provided that:
    "Notwithstanding the numerical limitation set forth in section 214(g)(1)(B) of
    the Immigration and Nationality Act (8 U.S.C. 1184(g)(1)(B)), the Secretary of
    Homeland Security, after consultation with the Secretary of Labor, and upon the
    determination that the needs of United States businesses cannot be satisfied during
    fiscal year 2026 with United States workers who are willing, qualified, and able
    to perform temporary nonagricultural labor, may increase the total number of aliens
    who may receive a visa under section 101(a)(15)(H)(ii)(b) of such Act (8 U.S.C.
    1101(a)(15)(H)(ii)(b)) in such fiscal year by not more than the highest number
    of H–2B nonimmigrants who participated in the H–2B returning worker program in
    any fiscal year in which returning workers were exempt from such numerical limitation."'
  retrieved_at: '2026-05-22'
- id: off_ina_389
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_389
  text: 'Pub. L. 109–162,title VIII, §832(b), Jan. 5, 2006,119 Stat. 3068, provided
    that: "The fact that an alien described in clause (i) or (ii) of section 101(a)(15)(K)
    of the Immigration and Nationality Act (8 U.S.C. 1101(a)(15)(K)) is aware of any
    information disclosed under the amendments made by this section [amending this
    section] or under section 833 [enactingsection 1375a of this titleand repealingsection
    1375 of this title] shall not be used to deny the alien eligibility for relief
    under any other provision of law."'
  retrieved_at: '2026-05-22'
- id: off_ina_390
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_390
  text: 'Pub. L. 109–13,div. B, title IV, §407, May 11, 2005,119 Stat. 321, provided
    that: "The requirements ofchapter 5 of title 5, United States Code(commonly referred
    to as the ''Administrative Procedure Act'') or any other law relating to rulemaking,
    information collection or publication in the Federal Register, shall not apply
    to any action to implement sections 402, 403, and 405 [amending this section andsection
    1356 of this titleand enacting provisions set out as notes under this section]
    or the amendments made by such sections to the extent the Secretary Homeland of
    Security, the Secretary of Labor, or the Secretary of State determine that compliance
    with any such requirement would impede the expeditious implementation of such
    sections or the amendments made by such sections."'
  retrieved_at: '2026-05-22'
- id: off_ina_391
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_391
  text: 'Pub. L. 108–447,div. J, title IV, §§415, 416, Dec. 8, 2004,118 Stat. 3352,
    provided that:'
  retrieved_at: '2026-05-22'
- id: off_ina_392
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_392
  text: '"Not later than 6 months after the date of enactment of this Act [Dec. 8,
    2004], the Inspector General of the Department of Homeland Security shall, consistent
    with the authority granted the Department under section 428 of the Homeland Security
    Act of 2002 (6 U.S.C. 236), examine and report to the Committees on the Judiciary
    of the House of Representatives and the Senate on the vulnerabilities and potential
    abuses in the visa program carried out under section 214(c) of the Immigration
    and Nationality Act (8 U.S.C. 1184(c)) with respect to nonimmigrants described
    in section 101(a)(15)(L) of such Act (8 U.S.C. 1101(a)(15)(L)).'
  retrieved_at: '2026-05-22'
- id: off_ina_393
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_393
  text: '"(a)Establishment.-Not later than 6 months after the date of enactment of
    this Act [Dec. 8, 2004], there shall be established an L Visa Interagency Task
    Force that consists of representatives from the Department of Homeland Security,
    the Department of Justice, and the Department of State. The Secretaries of each
    Department and each relevant bureau of the Department of Homeland Security shall
    appoint designees to the L Visa Interagency Task Force. The L Visa Interagency
    Task Force shall consult with other agencies deemed appropriate.'
  retrieved_at: '2026-05-22'
- id: off_ina_394
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_394
  text: '"(b)Report.-Not later than 6 months after the submission of the report by
    the Inspector General of the Department of Homeland Security in accordance with
    section 6 [probably means section 415 of div. J. ofPub. L. 108–447], the L Visa
    Interagency Task Force shall report to the Committees on the Judiciary of the
    House of Representatives and the Senate on the efforts to implement the recommendations
    set forth by the Inspector General''s report. The L Visa Interagency Task Force
    shall note specific areas of agreement and disagreement, and make recommendations
    to Congress on the findings of the Task Force, including any suggestions for legislation.
    The Task Force shall also review other additional issues as may be raised by the
    Inspector General''s report or by the Task Force''s own deliberations regarding
    the policies and purposes of the visa program relative to national goals and transnational
    commerce."'
  retrieved_at: '2026-05-22'
- id: off_ina_395
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_395
  text: 'Pub. L. 108–447,div. J, title IV, §425(b), Dec. 8, 2004,118 Stat. 3356, provided
    that: "Beginning on the date of enactment of this Act [Dec. 8, 2004], the Secretary
    of Homeland Security shall maintain statistical information on the country of
    origin and occupation of, educational level maintained by, and compensation paid
    to, each alien who is issued a visa or otherwise provided nonimmigrant status
    and is exempt under section 214(g)(5) of the Immigration and Nationality Act (8
    U.S.C. 1184(g)(5)) for each fiscal year. The statistical information shall be
    included in the annual report to Congress under section 416(c) of the American
    Competitiveness and Workforce Improvement Act of 1998 (Public Law 105–277;112
    Stat. 2681–655) [set out below]."'
  retrieved_at: '2026-05-22'
- id: off_ina_396
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_396
  text: '"(1)In general.-(A) Notwithstanding section 214(g)(1)(A)(ii) of the Immigration
    and Nationality Act (8 U.S.C. 1184(g)(1)(A)(ii)), the total number of aliens who
    may be issued visas or otherwise provided nonimmigrant status under section 101(a)(15)(H)(i)(b)
    of such Act [8 U.S.C. 1101(a)(15)(H)(i)(b)] in fiscal year 1999 is increased by
    a number equal to the number of aliens who are issued such a visa or provided
    such status during the period beginning on the date on which the limitation in
    such section 214(g)(1)(A)(ii) is reached and ending on September 30, 1999.'
  retrieved_at: '2026-05-22'
- id: off_ina_397
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_397
  text: '"(B) In the case of any alien on behalf of whom a petition for status under
    section 101(a)(15)(H)(i)(b) is filed before September 1, 2000, and is subsequently
    approved, that alien shall be counted toward the numerical ceiling for fiscal
    year 2000 notwithstanding the date of the approval of the petition. Notwithstanding
    section 214(g)(1)(A)(iii) of the Immigration and Nationality Act, the total number
    of aliens who may be issued visas or otherwise provided nonimmigrant status under
    section 101(a)(15)(H)(i)(b) of such Act in fiscal year 2000 is increased by a
    number equal to the number of aliens who may be issued visas or otherwise provided
    nonimmigrant status who filed a petition during the period beginning on the date
    on which the limitation in such section 214(g)(1)(A)(iii) is reached and ending
    on August 31, 2000.'
  retrieved_at: '2026-05-22'
- id: off_ina_398
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_398
  text: '"(2)Effective date.-Paragraph (1) shall take effect as if included in the
    enactment of section 411 of the American Competitiveness and Workforce Improvement
    Act of 1998 (as contained in title IV of division C of the Omnibus Consolidated
    and Emergency Supplemental Appropriations Act, 1999;Public Law 105–277) [see Effective
    Date of 1998 Amendment note above]."'
  retrieved_at: '2026-05-22'
- id: off_ina_399
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_399
  text: 'Pub. L. 106–313,title I, §104(c), Oct. 17, 2000,114 Stat. 1253, provided
    that: "Notwithstanding section 214(g)(4) of the Immigration and Nationality Act
    (8 U.S.C. 1184(g)(4)), any alien who-'
  retrieved_at: '2026-05-22'
- id: off_ina_400
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_400
  text: '"(1) is the beneficiary of a petition filed under section 204(a) of that
    Act [8 U.S.C. 1154(a)] for a preference status under paragraph (1), (2), or (3)
    of section 203(b) of that Act [8 U.S.C. 1153(b)]; and'
  retrieved_at: '2026-05-22'
- id: off_ina_401
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_401
  text: '"(2) is eligible to be granted that status but for application of the per
    country limitations applicable to immigrants under those paragraphs,'
  retrieved_at: '2026-05-22'
- id: off_ina_402
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_402
  text: may apply for, and the Attorney General may grant, an extension of such nonimmigrant
    status until the alien's application for adjustment of status has been processed
    and a decision made thereon."
  retrieved_at: '2026-05-22'
- id: off_ina_403
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_403
  text: 'Pub. L. 106–313,title I, §106(a), (b), Oct. 17, 2000,114 Stat. 1253,1254,
    as amended byPub. L. 107–273,div. C, title I, §11030A, Nov. 2, 2002,116 Stat.
    1836, provided that:'
  retrieved_at: '2026-05-22'
- id: off_ina_404
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_404
  text: '"(a)Exemption From Limitation.-The limitation contained in section 214(g)(4)
    of the Immigration and Nationality Act (8 U.S.C. 1184(g)(4)) with respect to the
    duration of authorized stay shall not apply to any nonimmigrant alien previously
    issued a visa or otherwise provided nonimmigrant status under section 101(a)(15)(H)(i)(b)
    of such Act (8 U.S.C. 1101(a)(15)(H)(i)(b)), if 365 days or more have elapsed
    since the filing of any of the following:'
  retrieved_at: '2026-05-22'
- id: off_ina_405
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_405
  text: '"(1) Any application for labor certification under section 212(a)(5)(A) of
    such Act (8 U.S.C. 1182(a)(5)(A)), in a case in which certification is required
    or used by the alien to obtain status under section 203(b) of such Act (8 U.S.C.
    1153(b)).'
  retrieved_at: '2026-05-22'
- id: off_ina_406
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_406
  text: '"(2) A petition described in section 204(b) of such Act (3 U.S.C. 1154(b))
    [8 U.S.C. 1154(b)] to accord the alien a status under section 203(b) of such Act.'
  retrieved_at: '2026-05-22'
- id: off_ina_407
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_407
  text: '"(b)Extension of H–1B Worker Status.-The Attorney General shall extend the
    stay of an alien who qualifies for an exemption under subsection (a) in one-year
    increments until such time as a final decision is made-'
  retrieved_at: '2026-05-22'
- id: off_ina_408
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_408
  text: '"(1) to deny the application described in subsection (a)(1), or, in a case
    in which such application is granted, to deny a petition described in subsection
    (a)(2) filed on behalf of the alien pursuant to such grant;'
  retrieved_at: '2026-05-22'
- id: off_ina_409
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_409
  text: '"(3) to grant or deny the alien''s application for an immigrant visa or for
    adjustment of status to that of an alien lawfully admitted for permanent residence."'
  retrieved_at: '2026-05-22'
- id: off_ina_410
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_410
  text: 'Pub. L. 106–313,title I, §114, Oct. 17, 2000,114 Stat. 1262, provided that:
    "The numerical limitations contained insection 102 of this title[amending this
    section and enacting provisions set out as a note above] shall not apply to any
    nonimmigrant alien granted a waiver that is subject to the limitation contained
    in paragraph (1)(B) of the first section 214(l) of the Immigration and Nationality
    Act [8 U.S.C. 1184(l)] (relating to restrictions on waivers)."'
  retrieved_at: '2026-05-22'
- id: off_ina_411
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_411
  text: 'Pub. L. 105–277,div. C, title IV, §416, Oct. 21, 1998,112 Stat. 2681–655,
    as amended byPub. L. 109–13,div. B, title IV, §406, May 11, 2005,119 Stat. 320,
    provided that:'
  retrieved_at: '2026-05-22'
- id: off_ina_412
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_412
  text: '"(a)Ensuring Accurate Count.-The Secretary of Homeland Security shall take
    such steps as are necessary to maintain an accurate count of the number of aliens
    subject to the numerical limitations of section 214(g)(1) of the Immigration and
    Nationality Act (8 U.S.C. 1184(g)(1)) who are issued visas or otherwise provided
    nonimmigrant status.'
  retrieved_at: '2026-05-22'
- id: off_ina_413
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_413
  text: '"(b)Revision of Petition Forms.-The Secretary of Homeland Security shall
    take such steps as are necessary to revise the forms used for petitions for visas
    or nonimmigrant status under clause (i)(b) or (ii)(b) of section 101(a)(15)(H)
    of the Immigration and Nationality Act (8 U.S.C. 1101(a)(15)(H)) so as to ensure
    that the forms provide the Secretary of Homeland Security with sufficient information
    to permit the Secretary of Homeland Security accurately to count the number of
    aliens subject to the numerical limitations of section 214(g)(1) of such Act (8
    U.S.C. 1184(g)(1)) who are issued visas or otherwise provided nonimmigrant status.'
  retrieved_at: '2026-05-22'
- id: off_ina_414
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_414
  text: '"(1)Quarterly notification.-Beginning not later than 60 days after the first
    day of fiscal year 1999, the Secretary of Homeland Security shall notify, on a
    quarterly basis, the Committees on the Judiciary of the United States House of
    Representatives and the Senate of the numbers of aliens who were issued visas
    or otherwise provided nonimmigrant status under section 101(a)(15)(H)(i)(b) of
    the Immigration and Nationality Act [8 U.S.C. 1101(a)(15)(H)(i)(b)] during the
    preceding 3-month period.'
  retrieved_at: '2026-05-22'
- id: off_ina_415
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_415
  text: '"(2)Annual submission.-Beginning with fiscal year 2000, the Secretary of
    Homeland Security shall submit on an annual basis, to the Committees on the Judiciary
    of the United States House of Representatives and the Senate, information on the
    countries of origin and occupations of, educational levels attained by, and compensation
    paid to, aliens who were issued visas or otherwise provided nonimmigrant status
    under section 101(a)(15)(H)(i)(b) of the Immigration and Nationality Act [8 U.S.C.
    1101(a)(15)(H)(i)(b)] during the previous fiscal year. With respect to the first
    submission under this paragraph, the information shall relate solely to aliens
    provided nonimmigrant status after the date that is 60 days after the date on
    which final regulations are issued to carry out section 412(a) [amendingsection
    1182 of this title].'
  retrieved_at: '2026-05-22'
- id: off_ina_416
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_416
  text: '"(3)Specification of number of petitions filed by certain employers.-Each
    notification under paragraph (1), and each submission under paragraph (2), shall
    include the number of aliens who were issued visas or otherwise provided nonimmigrant
    status pursuant to petitions filed by institutions or organizations described
    in section 212(p)(1) of the Immigration and Nationality Act [8 U.S.C. 1182(p)(1)]
    (as added bysection 415 of this title).'
  retrieved_at: '2026-05-22'
- id: off_ina_417
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_417
  text: '"(1)Semiannual notification.-Beginning not later than March 1, 2006, the
    Secretary of Homeland Security and the Secretary of State shall notify, on a semiannual
    basis, the Committees on the Judiciary of the House of Representatives and the
    Senate of the number of aliens who during the preceding 1-year period-'
  retrieved_at: '2026-05-22'
- id: off_ina_418
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_418
  text: '"(A) were issued visas or otherwise provided nonimmigrant status under section
    101(a)(15)(H)(ii)(b) of the Immigration and Nationality Act (8 U.S.C. 1101(a)(15)(H)(ii)(b));
    or'
  retrieved_at: '2026-05-22'
- id: off_ina_419
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_419
  text: '"(2)Annual submission.-Beginning in fiscal year 2007, the Secretary of Homeland
    Security and the Secretary of State shall submit, on an annual basis, to the Committees
    on the Judiciary of the House of Representatives and the Senate-'
  retrieved_at: '2026-05-22'
- id: off_ina_420
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_420
  text: '"(A) information on the countries of origin of, occupations of, and compensation
    paid to aliens who were issued visas or otherwise provided nonimmigrant status
    under section 101(a)(15)(H)(ii)(b) of the Immigration and Nationality Act (8 U.S.C.
    1101(a)(15)(H)(ii)(b)) during the previous fiscal year;'
  retrieved_at: '2026-05-22'
- id: off_ina_421
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_421
  text: '"(B) the number of aliens who had such a visa or such status expire or be
    revoked or otherwise terminated during each month of such fiscal year; and'
  retrieved_at: '2026-05-22'
- id: off_ina_422
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_422
  text: '"(C) the number of aliens who were provided nonimmigrant status under such
    section during both such fiscal year and the preceding fiscal year.'
  retrieved_at: '2026-05-22'
- id: off_ina_423
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_423
  text: '"(3)Information maintained by state.-If the Secretary of Homeland Security
    determines that information maintained by the Secretary of State is required to
    make a submission described in paragraph (1) or (2), the Secretary of State shall
    provide such information to the Secretary of Homeland Security upon request."'
  retrieved_at: '2026-05-22'
- id: off_ina_424
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_424
  text: 'Pub. L. 105–277,div. C, title IV, §418(b), Oct. 21, 1998,112 Stat. 2681–657,
    provided that: "The Chairman of the Board of Governors of the Federal Reserve
    System, the Director of the Office of Management and Budget, the Chair of the
    Council of Economic Advisers, the Secretary of the Treasury, the Secretary of
    Commerce, the Secretary of Labor, and any other member of the Cabinet, shall promptly
    report to the Congress the results of any reliable study that suggests, based
    on legitimate economic analysis, that the increase effected bysection 411(a) of
    this title[amending this section] in the number of aliens who may be issued visas
    or otherwise provided nonimmigrant status under section 101(a)(15)(H)(i)(b) of
    the Immigration and Nationality Act [8 U.S.C. 1101(a)(15)(H)(i)(b)] has had an
    impact on any national economic indicator, such as the level of inflation or unemployment,
    that warrants action by the Congress."'
  retrieved_at: '2026-05-22'
- id: off_ina_425
  source: ina_214b
