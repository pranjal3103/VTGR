  text: "a.(U) Determining Applicability at\r\nTime of Adjudication of Applications\
    \ for Labor Certification and/or Second or\r\nThird Employment-Based Preference\
    \ Petitions:� Since all applicants to\r\nwhom INA 212(a)(5)(B) applies are also\
    \ applicants to whom INA 212(a)(5)(A)\r\napplies, determinations under INA 212(a)(5)(B)\
    \ are made in connection with the\r\nadjudication of the application for labor\
    \ certification and/or, if applicable,\r\nthe adjudication of the second or third\
    \ preference petition.� For this reason,\r\nyou will not normally have occasion\
    \ to make such determinations.�"
