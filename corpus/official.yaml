- id: off_fam_004
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_4
  text: "(U)Immigration and Nationality\r\nAct Amendments of 1976, Public Law 94-571;\
    \ Armed Forces Immigration Adjustment\r\nAct of 1991, Public Law 102-110; Omnibus\
    \ Consolidated Appropriations Act, 1997,\r\nPublic Law 104-208, sec. 343."
  retrieved_at: '2026-05-22'
- id: off_fam_005
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_5
  text: "(U)An applicant (other than a\r\nH-1B, L, and V applicant) is presumed to\
    \ be an immigrant until they establish\r\nto your satisfaction that they are entitled\
    \ to nonimmigrant status under INA\r\n101(a)(15).�"
  retrieved_at: '2026-05-22'
- id: off_fam_006
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_6
  text: "(U)NIV cases are most often\r\nrefused under INA 214(b), a ground of refusal\
    \ that applies only to NIV\r\napplications.�"
  retrieved_at: '2026-05-22'
- id: off_fam_007
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_7
  text: "(U)With limited exceptions, all\r\nvisa applicants are presumed to be intending\
    \ immigrants and ineligible for an\r\nNIV until they satisfy you that they qualify\
    \ for one of the NIV categories\r\ndefined in INA 101(a)(15).� INA 291 places\
    \ the burden of proof on the applicant,\r\nwhich means the applicant must convince\
    \ you that they are qualified for the\r\nrequested visa; if you are not convinced,\
    \ the applicant is not eligible for an\r\nNIV.�"
  retrieved_at: '2026-05-22'
- id: off_fam_008
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_8
  text: "9 FAM 302.1-2(B)(3)� (U) Refusals Under INA 214(b) Versus\r\na Finding of\
    \ Permanent Ineligibility"
  retrieved_at: '2026-05-22'
- id: off_fam_009
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_9
  text: "a.(U)In\r\nGeneral:�An INA 214(b) refusal is not a permanent ineligibility,\
    \ in\r\ncontrast to an INA 212(a)(6)(C)(i) refusal, for example, which is a permanent\r\
    \nineligibility.� INA 214(b) is a basis for refusal of a visa to an applicant\
    \ who\r\nhas not established entitlement to an NIV classification by proving to\
    \ you that\r\nthey fall within one of the visa categories reflected in INA 101(a)(15).�\
    \ An\r\nNIV applicant who is refused a visa under INA 214(b) may be eligible for\
    \ an IV\r\nor another NIV classification or may even reapply for the same visa\r\
    \nclassification and establish eligibility to your satisfaction on the new\r\n\
    application."
  retrieved_at: '2026-05-22'
- id: off_fam_010
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_10
  text: "b.(U)Applying\r\nBothINA 214(b)andINA 212(a):�In a case where an applicant\
    \ is not\r\nqualified for the visa, refuse the visa application under all ineligibilities\r\
    \nthat apply. This means that if an applicant is ineligible under both INA 214(b)and\
    \ a permanent ground of ineligibility (or\r\nmultiple grounds of ineligibility)\
    \ enter all that apply (for example, if an\r\napplicant ineligible under INA 214(b)and\r\
    \nINA 212(a)(6)(C)(i) you would enter both refusals.) Therefore, in NIV cases\r\
    \nwhere an applicant is ineligible under a permanent ground of ineligibility,\
    \ you\r\nmust still make the finding as to whether the applicant overcomes INA\
    \ 214(b).�"
  retrieved_at: '2026-05-22'
- id: off_fam_011
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_11
  text: "a.(U)NIV\r\nQualification Standards:�When adjudicating NIV applications,\
    \ you should\r\napply the standards for qualifying for an NIV found in the relevant\
    \ subsections\r\nof INA 101(a)(15) and corresponding regulations and FAM guidance,\
    \ not in INA\r\n214(b) itself.� INA 214(b) does not provide any independent standards\
    \ for\r\nqualifying for an NIV.� The applicant's failure to convince you that\
    \ they meet\r\nany one of the specific requirements of the applicable NIV category\
    \ will result\r\nin an INA 214(b) denial. See9 FAM 401.1-3(E)for more information\
    \ on INA\r\n214(b)and immigrant intent."
  retrieved_at: '2026-05-22'
- id: off_fam_012
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_12
  text: "b.(U)Example:�For example, failure to possess sufficient funds to cover educational\r\
    \nexpenses results in a 214(b) denial of a student visa since that is a\r\nrequirement\
    \ of the F-1 visa classification; failure to make a substantial\r\ninvestment\
    \ results in a 214(b) denial of a treaty investor visa since that is\r\nthe requirement\
    \ of the E-2 visa classification; and the failure to possess the\r\nintent not\
    \ to abandon a foreign residence results in a 214(b) denial of a B\r\nvisa since\
    \ that is a requirement of the B visa classification.� In each of\r\nthese cases,\
    \ the visa is denied under 214(b) because the applicant has not met\r\nthe requirements\
    \ of that visa classification."
  retrieved_at: '2026-05-22'
- id: off_fam_013
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_13
  text: "c.�(U)Overcoming:�The 214(b) basis of refusal may be overcome in a later\
    \ visa application\r\nif the applicant demonstrates to your satisfaction that\
    \ they meet the\r\nrequirements of the NIV classification."
  retrieved_at: '2026-05-22'
- id: off_fam_014
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_14
  text: "(U)Congress expressly excluded\r\nH-1B, L, and V visas from the statutory\
    \ presumption of immigrant intent\r\ncontained in INA 214(b).� When adjudicating\
    \ visa applications in these\r\ncategories, review FAM guidance and other statutory\
    \ provisions, including INA\r\n212(a) grounds of ineligibility that are applicable\
    \ to these categories of\r\nvisas."
  retrieved_at: '2026-05-22'
- id: off_fam_015
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_15
  text: "a.(U)INA 214(b) does not\r\nsimply mean that applicants must have \"ties\"\
    \ to their home country.�\r\nA refusal under INA 214(b) means that the applicant\
    \ has failed to qualify for\r\nan NIV.� The most common reason that an applicant\
    \ fails to qualify is a failure\r\nto convince you that they are not an intending\
    \ immigrant, which is required for\r\nmost NIV classifications.� However, while\
    \ a failure to overcome the presumption\r\nof being an intending immigrant is\
    \ the most common reason for an INA 214(b)\r\nfinding, there are other reasons\
    \ that an applicant could fail to qualify for an\r\nNIV and thus be found ineligible\
    \ under INA 214(b)."
  retrieved_at: '2026-05-22'
- id: off_fam_016
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_16
  text: "c.(U)If you are not\r\nsatisfied that the applicant meets the standards required\
    \ by the visa\r\nclassification for which they are applying, refuse the applicant\
    \ under INA\r\n214(b).� This is true even in cases where the applicant has convinced\
    \ you that\r\nthey are not an intending immigrant, and even in cases where the\
    \ applicant is\r\nalso ineligible under another section of the law (for example,\
    \ INA\r\n212(a)(2)(C), INA 212(a)(3), INA 212(a)(6)(C), or INA 212(a)(6)(E))."
  retrieved_at: '2026-05-22'
- id: off_fam_017
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_17
  text: "(U)An AO is not required for an\r\nINA 214(b) refusal; however, if you have\
    \ a question about the interpretation or\r\napplication of a law or regulation,\
    \ you may request guidance from your adviser\r\nin L/CA."
  retrieved_at: '2026-05-22'
- id: off_fam_018
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_18
  text: "(U)There is no waiver available\r\nfor a refusal under INA 214(b).� An applicant\
    \ may overcome a 214(b) refusal.�\r\nFor more information on overcoming a refusal,\
    \ see9 FAM 306.2-2."
  retrieved_at: '2026-05-22'
- id: off_fam_019
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_19
  text: "9 FAM 302.1-3� (U) Documentation Requirements for\r\nImmigrant Visa Applicants\
    \ - INA 212(a)(7)(A)"
  retrieved_at: '2026-05-22'
- id: off_fam_020
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_20
  text: "(U)To comply with INA\r\n212(a)(7)(A), an immigrant must possess a valid,\
    \ unexpired U.S. IV (and any\r\nother documents needed for admission as an immigrant)\
    \ and valid, unexpired\r\ntravel document when seeking permission for admission\
    \ into the United States.\r\nINA 212(a)(7)(A)is generally applied by a\r\nCBP\
    \ officer at the POE.� INA 212(a)(7)(A)is\r\nnot applicable to NIV applicants."
  retrieved_at: '2026-05-22'
- id: off_fam_021
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_21
  text: "a.(U)You may not issue a\r\nvisa to the holder of an improperly issued travel\
    \ document, whether it was\r\nobtained either by providing fraudulent biographical\
    \ data or if it was issued\r\nby other than a competent authority as described\
    \ in9 FAM 403.9-3(A)(1).�\r\nLikewise, you may not issue a visa in an expired\
    \ passport unless the applicant\r\nis able to present collateral documentation,\
    \ which together with the expired\r\npassport, meets the requirements of INA 101(a)(30)\
    \ and INA 212(a)(7)(B)(i)(I)."
  retrieved_at: '2026-05-22'
- id: off_fam_022
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_22
  text: "b.(U)In addition to a valid\r\ntravel document, immigrants must have valid\
    \ documentation to demonstrate\r\neligibility for a visa.� Ensure that the IV\
    \ application complies with the\r\ndocumentation requirements of INA 222(a) through\
    \ (d)."
  retrieved_at: '2026-05-22'
- id: off_fam_023
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_23
  text: "(U)INA 212(a)(7)(A) is applied by\r\nCBP at the POE.� You may encounter visa\
    \ applicants whom CBP has found ineligible\r\nunder INA 212(a)(7)(A).� An AO is\
    \ not required in these cases; however, if you\r\nhave a question about the interpretation\
    \ or application of law or regulation,\r\nyou may request an AO from your adviser\
    \ in L/CA."
  retrieved_at: '2026-05-22'
- id: off_fam_024
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_24
  text: "(U)No waiver is available when\r\nthe visa applicationis submitted, and\r\
    \nthis ground of refusal is generally not applied by you since it has to do with\r\
    \nthe applicant presenting themselves for admission to the United States.�\r\n\
    However, under INA 212(k), DHS has the discretionary authority to admit an IV\r\
    \nholder at the POE, despite this ineligibility.� You may issue over a previous\r\
    \nfinding of INA 212(a)(7)(A)ineligibility\r\nif the applicant has overcome the\
    \ basis of the ineligibility (e.g., the\r\napplicant did not have a valid travel\
    \ document in the past, but now does.).�\r\nFollow guidance in9 FAM 303.3-5(E)(5)in\r\
    \nthese cases.�"
  retrieved_at: '2026-05-22'
- id: off_fam_025
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_25
  text: "9 fam 302.1-4� (U) documentation requirements for\r\nNonimmigrant visa applicants\
    \ - INA 212(a)(7)(B)"
  retrieved_at: '2026-05-22'
- id: off_fam_026
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_26
  text: "(U)A nonimmigrant without a\r\npassport valid for at least six months from\
    \ the date of the individual's\r\napplication for admission is ineligible under\
    \ INA 212(a)(7)(B).Likewise, if an applicant applies for\r\nadmission at a U.S.\
    \ POE and is not in possession of either a valid NIV or a\r\nborder crossing card,\
    \ CBP will normally find that applicant ineligible under\r\nINA 212(a)(7)(B).�In\
    \ rare instances\r\nwaivers of and exemptions from these documentary requirements\
    \ are possible and\r\nare detailed in9 FAM 201.1.� INA 212(a)(7)(B)is\r\nnot applicable\
    \ to IV applicants."
  retrieved_at: '2026-05-22'
- id: off_fam_027
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_27
  text: "(U)INA 212(a)(7)(B) is applied by\r\nCBP at the POE; however, you may encounter\
    \ visa applicants whom CBP has\r\npreviously identified as ineligible pursuant\
    \ to INA 212(a)(7)(B).� An AO is not\r\nrequired in these cases; however, if you\
    \ have a question about the interpretation\r\nor application of law or regulation,\
    \ you may request an AO from your adviser in\r\nL/CA.�"
  retrieved_at: '2026-05-22'
- id: off_fam_028
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_28
  text: "(U)For more information about the\r\nwaiver or exemptions from passport and\
    \ visa requirements, see9 FAM 201.1and9 FAM 305.3-1(C).� You may issue over a\
    \ previous finding of INA 212(a)(7)(B)\r\nineligibility if the applicant has overcome\
    \ the basis of the ineligibility\r\n(e.g., the applicant now has a valid travel\
    \ document).� Follow guidance in9 FAM 303.3-5(E)(5)in these cases.��"
  retrieved_at: '2026-05-22'
- id: off_fam_029
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_29
  text: "(U)INA 212(a)(5)(A) makes\r\nineligible any employment-based second and third\
    \ preference category IV\r\napplicants whose intended employment in the United\
    \ States has not been\r\ncertified by the Department of Labor(DOL)\r\nor who are\
    \ clearly unqualified for their certified employment.� There are some\r\nexceptions\
    \ for second preference applicants.� See9 FAM 302.1-5(B)(2)below."
  retrieved_at: '2026-05-22'
- id: off_fam_030
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_30
  text: "a.(U)The DOL has\r\nresponsibility for granting labor certifications for\
    \ two categories of\r\nemployment-based immigrants:� preference groups 2 and 3.�\
    \ Second preference\r\nincludes immigrants who are members of the professions\
    \ holding advanced degrees\r\nand immigrants of exceptional ability in the sciences,\
    \ arts, or business.�\r\nThird preference includes professionals, skilled, and\
    \ other unskilled workers."
  retrieved_at: '2026-05-22'
- id: off_fam_031
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_31
  text: "b.(U) General Background on Labor\r\nCertification by DOL:The DOL has authority\
    \ over labor certification for\r\npermanent employment of a noncitizen worker.�\
    \ Several steps in the recruitment\r\nprocess are designed to ensure that the\
    \ employment of a noncitizen worker will\r\nnot adversely affect the job opportunities,\
    \ conditions, or wages for U.S.\r\nworkers."
  retrieved_at: '2026-05-22'
- id: off_fam_032
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_32
  text: "(U)In general, an applicant in\r\nthe second and third preferences must possess\
    \ an individual labor\r\ncertification, an application for Schedule A certification,\
    \ or evidence that\r\nthey qualify for the Labor Market Information Pilot Program.�\
    \ However, in the\r\ncase of a second preference applicant, the Secretary of DHS\
    \ may waive the job\r\noffer requirement, and thus a labor certification, for\
    \ applicants of\r\nexceptional ability in the sciences, arts, professions, or\
    \ business and for\r\ncertain noncitizen physicians (see9 FAM 502.4-3(E))when\
    \ it is deemed to be in\r\nthe national interest."
  retrieved_at: '2026-05-22'
- id: off_fam_033
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_33
  text: "a.(U) In General:�The DOL\r\nattempts to minimize the operational impact\
    \ of its statutory responsibilities\r\nwith “Schedules” for types of cases in\
    \ which either a definite\r\napproval or a very probable disapproval will result,\
    \ without having to\r\nundertake the individual analysis required in the great\
    \ majority of cases.�"
  retrieved_at: '2026-05-22'
- id: off_fam_034
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_34
  text: "(1)�(U)TheDOL’s Schedule A (see 20 CFR 656.5) sets\r\nforth occupational\
    \ and professional groups in which there is a nationwide\r\nshortage of workers\
    \ willing, able, qualified (or equally qualified in the case\r\nof applicants\
    \ who are members of the teaching profession or who have\r\nexceptional ability\
    \ in the sciences or the arts), and available and in which\r\nthe employment of\
    \ applicants will not, presumably, affect adversely the wages\r\nand working conditions\
    \ of workers in the United States similarly employed."
  retrieved_at: '2026-05-22'
- id: off_fam_035
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_35
  text: "(2)�(U)An employer for an\r\napplicant in an occupation that qualifies for\
    \ Schedule A may file an\r\napplication for certification with the appropriate\
    \ DHS office.� Schedule A, as\r\namended by the Immigration Act of 1990, lists\
    \ two such occupational groups as\r\nfollows:"
  retrieved_at: '2026-05-22'
- id: off_fam_036
  source: 9_fam_302_1
  source_url: https://fam.state.gov/fam/09FAM/09FAM030201.html
  section: ''
  paragraph_anchor: p_36
  text: "(c)�(U)Because the Immigration\r\nAct of 1990 requires all applicants for\
    \ employment-based classification to be\r\nthe beneficiary of a petition filed\
    \ with DHS, you no longer have responsibility\r\nfor determining whether an applicant\
    \ is within one of these occupational\r\ngroups.� Refer applicants who may qualify\
    \ under Schedule A to the appropriate\r\nDHS office."
  retrieved_at: '2026-05-22'
- id: off_fam_037
