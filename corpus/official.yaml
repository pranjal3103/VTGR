  text: The International Organizations Immunities Act, referred to in subsec. (b),
    is actDec. 29, 1945, ch. 652, title I,59 Stat. 669, which is classified principally
    to subchapter XVIII (§288 et seq.) ofchapter 7 of Title 22, Foreign Relations
    and Intercourse. For complete classification of this Act to the Code, see Short
    Title note set out undersection 288 of Title 22and Tables.
  retrieved_at: '2026-05-22'
