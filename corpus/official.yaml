  paragraph_anchor: p_436
  text: '"(a) 5-Year Provision.-With respect to work authorization for aliens admitted
    as nonimmigrant students described in subparagraph (F) of section 101(a)(15) of
    the Immigration and Nationality Act [8 U.S.C. 1101(a)(15)] during the 5-year period
    beginning October 1, 1991, the Attorney General shall grant such an alien work
    authorization to be employed off-campus if-'
  retrieved_at: '2026-05-22'
- id: off_ina_437
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_437
  text: '"(1) the alien has completed 1 academic year as such a nonimmigrant and is
    maintaining good academic standing at the educational institution,'
  retrieved_at: '2026-05-22'
- id: off_ina_438
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_438
  text: '"(2) the employer provides the educational institution and the Secretary
    of Labor with an attestation that the employer (A) has recruited for at least
    60 days for the position and (B) will provide for payment to the alien and to
    other similarly situated workers at a rate equal to not less than the actual wage
    level for the occupation at the place of employment or, if greater, the prevailing
    wage level for the occupation in the area of employment, and'
  retrieved_at: '2026-05-22'
- id: off_ina_439
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_439
  text: '"(3) the alien will not be employed more than 20 hours each week during the
    academic term (but may be employed on a full-time basis during vacation periods
    and between academic terms).'
  retrieved_at: '2026-05-22'
- id: off_ina_440
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_440
  text: If the Secretary of Labor determines that an employer has provided an attestation
    under paragraph (2) that is materially false or has failed to pay wages in accordance
    with the attestation, after notice and opportunity for a hearing, the employer
    shall be disqualified from employing an alien student under this subsection.
  retrieved_at: '2026-05-22'
