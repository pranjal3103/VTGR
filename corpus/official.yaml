  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_20
  text: (III) performs as an athlete, or as a coach, as part of a team or franchise
    that is located in the United States and a member of a foreign league or association
    of 15 or more amateur sports teams, if-
  retrieved_at: '2026-05-22'
- id: off_ina_021
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_21
  text: (aa) the foreign league or association is the highest level of amateur performance
    of that sport in the relevant foreign country;
  retrieved_at: '2026-05-22'
- id: off_ina_022
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_22
  text: (bb) participation in such league or association renders players ineligible,
    whether on a temporary or permanent basis, to earn a scholarship in, or participate
    in, that sport at a college or university in the United States under the rules
    of the National Collegiate Athletic Association; and
  retrieved_at: '2026-05-22'
- id: off_ina_023
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_23
  text: (cc) a significant number of the individuals who play in such league or association
    are drafted by a major sports league or a minor league affiliate of such a sports
    league; or
  retrieved_at: '2026-05-22'
- id: off_ina_024
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_24
  text: (IV) is a professional athlete or amateur athlete who performs individually
    or as part of a group in a theatrical ice skating production; and
  retrieved_at: '2026-05-22'
- id: off_ina_025
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_25
  text: (ii) seeks to enter the United States temporarily and solely for the purpose
    of performing-
  retrieved_at: '2026-05-22'
- id: off_ina_026
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_26
  text: (II) in the case of an individual described in clause (i)(IV), in a specific
    theatrical ice skating production or tour.
  retrieved_at: '2026-05-22'
- id: off_ina_027
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_27
  text: (B)(i) For purposes ofsection 1101(a)(15)(P)(i)(b) of this title, an alien
    is described in this subparagraph if the alien-
  retrieved_at: '2026-05-22'
- id: off_ina_028
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_28
  text: (I) performs with or is an integral and essential part of the performance
    of an entertainment group that has (except as provided in clause (ii)) been recognized
    internationally as being outstanding in the discipline for a sustained and substantial
    period of time,
  retrieved_at: '2026-05-22'
- id: off_ina_029
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_29
  text: (II) in the case of a performer or entertainer, except as provided in clause
    (iii), has had a sustained and substantial relationship with that group (ordinarily
    for at least one year) and provides functions integral to the performance of the
    group, and
  retrieved_at: '2026-05-22'
- id: off_ina_030
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_30
  text: (III) seeks to enter the United States temporarily and solely for the purpose
    of performing as such a performer or entertainer or as an integral and essential
    part of a performance.
  retrieved_at: '2026-05-22'
- id: off_ina_031
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_31
  text: (ii) In the case of an entertainment group that is recognized nationally as
    being outstanding in its discipline for a sustained and substantial period of
    time, the Attorney General may, in consideration of special circumstances, waive
    the international recognition requirement of clause (i)(I).
  retrieved_at: '2026-05-22'
- id: off_ina_032
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_32
  text: (iii)(I) The one-year relationship requirement of clause (i)(II) shall not
    apply to 25 percent of the performers and entertainers in a group.
  retrieved_at: '2026-05-22'
- id: off_ina_033
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_33
  text: (II) The Attorney General may waive such one-year relationship requirement
    for an alien who because of illness or unanticipated and exigent circumstances
    replaces an essential member of the group and for an alien who augments the group
    by performing a critical role.
  retrieved_at: '2026-05-22'
- id: off_ina_034
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_34
  text: (iv) The requirements of subclauses (I) and (II) of clause (i) shall not apply
    to alien circus personnel who perform as part of a circus or circus group or who
    constitute an integral and essential part of the performance of such circus or
    circus group, but only if such personnel are entering the United States to join
    a circus that has been recognized nationally as outstanding for a sustained and
    substantial period of time or as part of such a circus.
  retrieved_at: '2026-05-22'
- id: off_ina_035
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_35
  text: (C) A person may petition the Attorney General for classification of an alien
    as a nonimmigrant undersection 1101(a)(15)(P) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_036
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_36
  text: (D) The Attorney General shall approve petitions under this subsection with
    respect to nonimmigrants described in clause (i) or (iii) ofsection 1101(a)(15)(P)
    of this titleonly after consultation in accordance with paragraph (6).
  retrieved_at: '2026-05-22'
- id: off_ina_037
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_37
  text: (E) The Attorney General shall approve petitions under this subsection for
    nonimmigrants described insection 1101(a)(15)(P)(ii) of this titleonly after consultation
    with labor organizations representing artists and entertainers in the United States.
  retrieved_at: '2026-05-22'
- id: off_ina_038
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_38
  text: (F)(i) No nonimmigrant visa undersection 1101(a)(15)(P)(i)(a) of this titleshall
    be issued to any alien who is a national of a country that is a state sponsor
    of international terrorism unless the Secretary of State determines, in consultation
    with the Secretary of Homeland Security and the heads of other appropriate United
    States agencies, that such alien does not pose a threat to the safety, national
    security, or national interest of the United States. In making a determination
    under this subparagraph, the Secretary of State shall apply standards developed
    by the Secretary of State, in consultation with the Secretary of Homeland Security
    and the heads of other appropriate United States agencies, that are applicable
    to the nationals of such states.
  retrieved_at: '2026-05-22'
- id: off_ina_039
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_39
  text: (ii) In this subparagraph, the term "state sponsor of international terrorism"
    means any country the government of which has been determined by the Secretary
    of State under any of the laws specified in clause (iii) to have repeatedly provided
    support for acts of international terrorism.
  retrieved_at: '2026-05-22'
- id: off_ina_040
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_40
  text: (G) The Secretary of Homeland Security shall permit a petition under this
    subsection to seek classification of more than 1 alien as a nonimmigrant undersection
    1101(a)(15)(P)(i)(a) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_041
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_41
  text: (H) The Secretary of Homeland Security shall permit an athlete, or the employer
    of an athlete, to seek admission to the United States for such athlete under a
    provision of this chapter other thansection 1101(a)(15)(P)(i) of this titleif
    the athlete is eligible under such other provision.
  retrieved_at: '2026-05-22'
- id: off_ina_042
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_42
  text: (5)(A) In the case of an alien who is provided nonimmigrant status undersection
    1101(a)(15)(H)(i)(b) or 1101(a)(15)(H)(ii)(b) of this titleand who is dismissed
    from employment by the employer before the end of the period of authorized admission,
    the employer shall be liable for the reasonable costs of return transportation
    of the alien abroad.
  retrieved_at: '2026-05-22'
- id: off_ina_043
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_43
  text: (B) In the case of an alien who is admitted to the United States in nonimmigrant
    status undersection 1101(a)(15)(O) or 1101(a)(15)(P) of this titleand whose employment
    terminates for reasons other than voluntary resignation, the employer whose offer
    of employment formed the basis of such nonimmigrant status and the petitioner
    are jointly and severally liable for the reasonable cost of return transportation
    of the alien abroad. The petitioner shall provide assurance satisfactory to the
    Attorney General that the reasonable cost of that transportation will be provided.
  retrieved_at: '2026-05-22'
- id: off_ina_044
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_44
  text: (6)(A)(i) To meet the consultation requirement of paragraph (3)(A) in the
    case of a petition for a nonimmigrant described insection 1101(a)(15)(O)(i) of
    this title(other than with respect to aliens seeking entry for a motion picture
    or television production), the petitioner shall submit with the petition an advisory
    opinion from a peer group (or other person or persons of its choosing, which may
    include a labor organization) with expertise in the specific field involved.
  retrieved_at: '2026-05-22'
- id: off_ina_045
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_45
  text: (ii) To meet the consultation requirement of paragraph (3)(B) in the case
    of a petition for a nonimmigrant described insection 1101(a)(15)(O)(ii) of this
    title(other than with respect to aliens seeking entry for a motion picture or
    television production), the petitioner shall submit with the petition an advisory
    opinion from a labor organization with expertise in the skill area involved.
  retrieved_at: '2026-05-22'
- id: off_ina_046
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_46
  text: (iii) To meet the consultation requirement of paragraph (4)(D) in the case
    of a petition for a nonimmigrant described insection 1101(a)(15)(P)(i) or 1101(a)(15)(P)(iii)
    of this title, the petitioner shall submit with the petition an advisory opinion
    from a labor organization with expertise in the specific field of athletics or
    entertainment involved.
  retrieved_at: '2026-05-22'
- id: off_ina_047
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_47
  text: (B) To meet the consultation requirements of subparagraph (A), unless the
    petitioner submits with the petition an advisory opinion from an appropriate labor
    organization, the Attorney General shall forward a copy of the petition and all
    supporting documentation to the national office of an appropriate labor organization
    within 5 days of the date of receipt of the petition. If there is a collective
    bargaining representative of an employer's employees in the occupational classification
    for which the alien is being sought, that representative shall be the appropriate
    labor organization.
  retrieved_at: '2026-05-22'
- id: off_ina_048
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_48
  text: (C) In those cases in which a petitioner described in subparagraph (A) establishes
    that an appropriate peer group (including a labor organization) does not exist,
    the Attorney General shall adjudicate the petition without requiring an advisory
    opinion.
  retrieved_at: '2026-05-22'
- id: off_ina_049
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_49
  text: (D) Any person or organization receiving a copy of a petition described in
    subparagraph (A) and supporting documents shall have no more than 15 days following
    the date of receipt of such documents within which to submit a written advisory
    opinion or comment or to provide a letter of no objection. Once the 15-day period
    has expired and the petitioner has had an opportunity, where appropriate, to supply
    rebuttal evidence, the Attorney General shall adjudicate such petition in no more
    than 14 days. The Attorney General may shorten any specified time period for emergency
    reasons if no unreasonable burden would be thus imposed on any participant in
    the process.
  retrieved_at: '2026-05-22'
- id: off_ina_050
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_50
  text: (E)(i) The Attorney General shall establish by regulation expedited consultation
    procedures in the case of nonimmigrant artists or entertainers described insection
    1101(a)(15)(O) or 1101(a)(15)(P) of this titleto accommodate the exigencies and
    scheduling of a given production or event.
  retrieved_at: '2026-05-22'
- id: off_ina_051
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_51
  text: (ii) The Attorney General shall establish by regulation expedited consultation
    procedures in the case of nonimmigrant athletes described insection 1101(a)(15)(O)(i)
    or 1101(a)(15)(P)(i) of this titlein the case of emergency circumstances (including
    trades during a season).
  retrieved_at: '2026-05-22'
- id: off_ina_052
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_52
  text: (F) No consultation required under this subsection by the Attorney General
    with a nongovernmental entity shall be construed as permitting the Attorney General
    to delegate any authority under this subsection to such an entity. The Attorney
    General shall give such weight to advisory opinions provided under this section
    as the Attorney General determines, in his sole discretion, to be appropriate.
  retrieved_at: '2026-05-22'
- id: off_ina_053
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_53
  text: (7) If a petition is filed and denied under this subsection, the Attorney
    General shall notify the petitioner of the determination and the reasons for the
    denial and of the process by which the petitioner may appeal the determination.
  retrieved_at: '2026-05-22'
- id: off_ina_054
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_54
  text: '(8) The Attorney General shall submit annually to the Committees on the Judiciary
    of the House of Representatives and of the Senate a report describing, with respect
    to petitions under each subcategory of subparagraphs (H), (O), (P), and (Q) ofsection
    1101(a)(15) of this titlethe following:'
  retrieved_at: '2026-05-22'
- id: off_ina_055
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_55
  text: (B) The number of such petitions which have been approved and the number of
    workers (by occupation) included in such approved petitions.
  retrieved_at: '2026-05-22'
- id: off_ina_056
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_56
  text: (C) The number of such petitions which have been denied and the number of
    workers (by occupation) requested in such denied petitions.
  retrieved_at: '2026-05-22'
- id: off_ina_057
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_57
  text: (9)(A) The Attorney General shall impose a fee on an employer (excluding any
    employer that is a primary or secondary education institution, an institution
    of higher education, as defined insection 1001(a) of title 20, a nonprofit entity
    related to or affiliated with any such institution, a nonprofit entity which engages
    in established curriculum-related clinical training of students registered at
    any such institution, a nonprofit research organization, or a governmental research
    organization) filing before2a petition under paragraph (1)-
  retrieved_at: '2026-05-22'
- id: off_ina_058
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_58
  text: (i) initially to grant an alien nonimmigrant status described insection 1101(a)(15)(H)(i)(b)
    of this title;
  retrieved_at: '2026-05-22'
- id: off_ina_059
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_59
  text: (ii) to extend the stay of an alien having such status (unless the employer
    previously has obtained an extension for such alien); or
  retrieved_at: '2026-05-22'
- id: off_ina_060
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_60
  text: (iii) to obtain authorization for an alien having such status to change employers.
  retrieved_at: '2026-05-22'
- id: off_ina_061
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_61
  text: (B) The amount of the fee shall be $1,500 for each such petition except that
    the fee shall be half the amount for each such petition by any employer with not
    more than 25 full-time equivalent employees who are employed in the United States
    (determined by including any affiliate or subsidiary of such employer).
  retrieved_at: '2026-05-22'
- id: off_ina_062
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_62
  text: (C) Fees collected under this paragraph shall be deposited in the Treasury
    in accordance withsection 1356(s) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_063
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_63
  text: (10) An amended H–1B petition shall not be required where the petitioning
    employer is involved in a corporate restructuring, including but not limited to
    a merger, acquisition, or consolidation, where a new corporate entity succeeds
    to the interests and obligations of the original petitioning employer and where
    the terms and conditions of employment remain the same but for the identity of
    the petitioner.
  retrieved_at: '2026-05-22'
- id: off_ina_064
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_64
  text: (11)(A) Subject to subparagraph (B), the Secretary of Homeland Security or
    the Secretary of State, as appropriate, shall impose a fee on an employer who
    has filed an attestation described insection 1182(t) of this title-
  retrieved_at: '2026-05-22'
- id: off_ina_065
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_65
  text: (i) in order that an alien may be initially granted nonimmigrant status described
    insection 1101(a)(15)(H)(i)(b1) of this title; or
  retrieved_at: '2026-05-22'
- id: off_ina_066
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_66
  text: (ii) in order to satisfy the requirement of the second sentence of subsection
    (g)(8)(C) for an alien having such status to obtain certain extensions of stay.
  retrieved_at: '2026-05-22'
- id: off_ina_067
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_67
  text: (B) The amount of the fee shall be the same as the amount imposed by the Secretary
    of Homeland Security under paragraph (9), except that if such paragraph does not
    authorize such Secretary to impose any fee, no fee shall be imposed under this
    paragraph.
  retrieved_at: '2026-05-22'
- id: off_ina_068
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_68
  text: (C) Fees collected under this paragraph shall be deposited in the Treasury
    in accordance withsection 1356(s) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_069
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_69
  text: (12)(A) In addition to any other fees authorized by law, the Secretary of
    Homeland Security shall impose a fraud prevention and detection fee on an employer
    filing a petition under paragraph (1)-
  retrieved_at: '2026-05-22'
- id: off_ina_070
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_70
  text: (i) initially to grant an alien nonimmigrant status described in subparagraph
    (H)(i)(b) or (L) ofsection 1101(a)(15) of this title; or
  retrieved_at: '2026-05-22'
- id: off_ina_071
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_71
  text: (ii) to obtain authorization for an alien having such status to change employers.
  retrieved_at: '2026-05-22'
- id: off_ina_072
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_72
  text: (B) In addition to any other fees authorized by law, the Secretary of State
    shall impose a fraud prevention and detection fee on an alien filing an application
    abroad for a visa authorizing admission to the United States as a nonimmigrant
    described insection 1101(a)(15)(L) of this title, if the alien is covered under
    a blanket petition described in paragraph (2)(A).
  retrieved_at: '2026-05-22'
- id: off_ina_073
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_73
  text: (D) The fee imposed under subparagraph (A) or (B) shall only apply to principal
    aliens and not to the spouses or children who are accompanying or following to
    join such principal aliens.
  retrieved_at: '2026-05-22'
- id: off_ina_074
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_74
  text: (E) Fees collected under this paragraph shall be deposited in the Treasury
    in accordance withsection 1356(v) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_075
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_75
  text: (13)(A) In addition to any other fees authorized by law, the Secretary of
    Homeland Security shall impose a fraud prevention and detection fee on an employer
    filing a petition under paragraph (1) for nonimmigrant workers described insection
    1101(a)(15)(H)(ii)(b) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_076
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_76
  text: (14)(A) If the Secretary of Homeland Security finds, after notice and an opportunity
    for a hearing, a substantial failure to meet any of the conditions of the petition
    to admit or otherwise provide status to a nonimmigrant worker undersection 1101(a)(15)(H)(ii)(b)
    of this titleor a willful misrepresentation of a material fact in such petition-
  retrieved_at: '2026-05-22'
- id: off_ina_077
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_77
  text: (i) the Secretary of Homeland Security may, in addition to any other remedy
    authorized by law, impose such administrative remedies (including civil monetary
    penalties in an amount not to exceed $10,000 per violation) as the Secretary of
    Homeland Security determines to be appropriate; and
  retrieved_at: '2026-05-22'
- id: off_ina_078
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_78
  text: (ii) the Secretary of Homeland Security may deny petitions filed with respect
    to that employer undersection 1154 of this titleor paragraph (1) of this subsection
    during a period of at least 1 year but not more than 5 years for aliens to be
    employed by the employer.
  retrieved_at: '2026-05-22'
- id: off_ina_079
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_79
  text: (B) The Secretary of Homeland Security may delegate to the Secretary of Labor,
    with the agreement of the Secretary of Labor, any of the authority given to the
    Secretary of Homeland Security under subparagraph (A)(i).
  retrieved_at: '2026-05-22'
- id: off_ina_080
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_80
  text: (C) In determining the level of penalties to be assessed under subparagraph
    (A), the highest penalties shall be reserved for willful failures to meet any
    of the conditions of the petition that involve harm to United States workers.
  retrieved_at: '2026-05-22'
- id: off_ina_081
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_81
  text: (D) In this paragraph, the term "substantial failure" means the willful failure
    to comply with the requirements of this section that constitutes a significant
    deviation from the terms and conditions of a petition.
  retrieved_at: '2026-05-22'
- id: off_ina_082
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_82
  text: (1) A visa shall not be issued under the provisions ofsection 1101(a)(15)(K)(i)
    of this titleuntil the consular officer has received a petition filed in the United
    States by the fiancée and fiancé of the applying alien and approved by the Secretary
    of Homeland Security. The petition shall be in such form and contain such information
    as the Secretary of Homeland Security shall, by regulation, prescribe. Such information
    shall include information on any criminal convictions of the petitioner for any
    specified crime described in paragraph (3)(B) and information on any permanent
    protection or restraining order issued against the petitioner related to any specified
    crime described in paragraph (3)(B)(i). It shall be approved only after satisfactory
    evidence is submitted by the petitioner to establish that the parties have previously
    met in person within 2 years before the date of filing the petition, have a bona
    fide intention to marry, and are legally able and actually willing to conclude
    a valid marriage in the United States within a period of ninety days after the
    alien's arrival, except that the Secretary of Homeland Security in his discretion
    may waive the requirement that the parties have previously met in person. In the
    event the marriage with the petitioner does not occur within three months after
    the admission of the said alien and minor children, they shall be required to
    depart from the United States and upon failure to do so shall be removed in accordance
    withsections 1229a and 1231 of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_083
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_83
  text: (2)(A) Subject to subparagraphs (B) and (C), the Secretary of Homeland Security
    may not approve a petition under paragraph (1) unless the Secretary has verified
    that-
  retrieved_at: '2026-05-22'
- id: off_ina_084
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_84
  text: (i) the petitioner has not, previous to the pending petition, petitioned under
    paragraph (1) with respect to two or more applying aliens; and
  retrieved_at: '2026-05-22'
- id: off_ina_085
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_85
  text: (ii) if the petitioner has had such a petition previously approved, 2 years
    have elapsed since the filing of such previously approved petition.
  retrieved_at: '2026-05-22'
- id: off_ina_086
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_86
  text: (B) The Secretary of Homeland Security may, in the Secretary's discretion,
    waive the limitations in subparagraph (A) if justification exists for such a waiver.
    Except in extraordinary circumstances and subject to subparagraph (C), such a
    waiver shall not be granted if the petitioner has a record of violent criminal
    offenses against a person or persons.
  retrieved_at: '2026-05-22'
- id: off_ina_087
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_87
  text: (C)(i) The Secretary of Homeland Security is not limited by the criminal court
    record and shall grant a waiver of the condition described in the second sentence
    of subparagraph (B) in the case of a petitioner described in clause (ii).
  retrieved_at: '2026-05-22'
- id: off_ina_088
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_88
  text: (ii) A petitioner described in this clause is a petitioner who has been battered
    or subjected to extreme cruelty and who is or was not the primary perpetrator
    of violence in the relationship upon a determination that-
  retrieved_at: '2026-05-22'
- id: off_ina_089
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_89
  text: (II) the petitioner was found to have violated a protection order intended
    to protect the petitioner; or
  retrieved_at: '2026-05-22'
- id: off_ina_090
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_90
  text: (III) the petitioner committed, was arrested for, was convicted of, or pled
    guilty to committing a crime that did not result in serious bodily injury and
    where there was a connection between the crime and the petitioner's having been
    battered or subjected to extreme cruelty.
  retrieved_at: '2026-05-22'
- id: off_ina_091
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_91
  text: (iii) In acting on applications under this subparagraph, the Secretary of
    Homeland Security shall consider any credible evidence relevant to the application.
    The determination of what evidence is credible and the weight to be given that
    evidence shall be within the sole discretion of the Secretary.
  retrieved_at: '2026-05-22'
- id: off_ina_092
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_92
  text: (A) The terms "domestic violence", "sexual assault", "child abuse and neglect",
    "dating violence", "elder abuse", and "stalking" have the meaning given such terms
    in section 3 of the Violence Against Women and Department of Justice Reauthorization
    Act of 2005.1
  retrieved_at: '2026-05-22'
- id: off_ina_093
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_93
  text: (i) Domestic violence, sexual assault, child abuse and neglect, dating violence,
    elder abuse, stalking, or an attempt to commit any such crime.
  retrieved_at: '2026-05-22'
- id: off_ina_094
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_94
  text: (ii) Homicide, murder, manslaughter, rape, abusive sexual contact, sexual
    exploitation, incest, torture, trafficking, peonage, holding hostage, involuntary
    servitude, slave trade, kidnapping, abduction, unlawful criminal restraint, false
    imprisonment, or an attempt to commit any of the crimes described in this clause.
  retrieved_at: '2026-05-22'
- id: off_ina_095
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_95
  text: (iii) At least three convictions for crimes relating to a controlled substance
    or alcohol not arising from a single act.
  retrieved_at: '2026-05-22'
- id: off_ina_096
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_96
  text: (1) An alien who is a citizen of Canada or Mexico, and the spouse and children
    of any such alien if accompanying or following to join such alien, who seeks to
    enter the United States under and pursuant to the provisions of Section D of Annex
    16–A of the USMCA (as defined insection 4502 of title 19) to engage in business
    activities at a professional level as provided for in such Annex, may be admitted
    for such purpose under regulations of the Attorney General promulgated after consultation
    with the Secretaries of State and Labor. For purposes of this chapter, including
    the issuance of entry documents and the application of subsection (b), such alien
    shall be treated as if seeking classification, or classifiable, as a nonimmigrant
    undersection 1101(a)(15) of this title. For purposes of this paragraph, the term
    "citizen of Mexico" means "citizen" as defined in article 16.1 of the USMCA.
  retrieved_at: '2026-05-22'
- id: off_ina_097
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_97
  text: (2) In the case of an alien spouse admitted undersection 1101(a)(15)(E) of
    this title, who is accompanying or following to join a principal alien admitted
    under such section, the Attorney General shall authorize the alien spouse to engage
    in employment in the United States and provide the spouse with an "employment
    authorized" endorsement or other appropriate work permit.
  retrieved_at: '2026-05-22'
- id: off_ina_098
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_98
  text: (1) Except as provided in paragraph (3), no alien shall be entitled to nonimmigrant
    status described insection 1101(a)(15)(D) of this titleif the alien intends to
    land for the purpose of performing service on board a vessel of the United States
    (as defined insection 116 of title 46) or on an aircraft of an air carrier (as
    defined insection 40102(a)(2) of title 49) during a labor dispute where there
    is a strike or lockout in the bargaining unit of the employer in which the alien
    intends to perform such service.
  retrieved_at: '2026-05-22'
- id: off_ina_099
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_99
  text: (A) may not be paroled into the United States pursuant tosection 1182(d)(5)
    of this titleunless the Attorney General determines that the parole of such alien
    is necessary to protect the national security of the United States; and
  retrieved_at: '2026-05-22'
- id: off_ina_100
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_100
  text: (B) shall be considered not to be a bona fide crewman for purposes ofsection
    1282(b) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_101
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_101
  text: (3) Paragraph (1) shall not apply to an alien if the air carrier or owner
    or operator of such vessel that employs the alien provides documentation that
    satisfies the Attorney General that the alien-
  retrieved_at: '2026-05-22'
- id: off_ina_102
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_102
  text: (A) has been an employee of such employer for a period of not less than 1
    year preceding the date that a strike or lawful lockout commenced;
  retrieved_at: '2026-05-22'
- id: off_ina_103
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_103
  text: (B) has served as a qualified crewman for such employer at least once in each
    of 3 months during the 12-month period preceding such date; and
  retrieved_at: '2026-05-22'
- id: off_ina_104
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_104
  text: (C) shall continue to provide the same services that such alien provided as
    such a crewman.
  retrieved_at: '2026-05-22'
- id: off_ina_105
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_105
  text: (1) The total number of aliens who may be issued visas or otherwise provided
    nonimmigrant status during any fiscal year (beginning with fiscal year 1992)-
  retrieved_at: '2026-05-22'
- id: off_ina_106
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_106
  text: (2) The numerical limitations of paragraph (1) shall only apply to principal
    aliens and not to the spouses or children of such aliens.
  retrieved_at: '2026-05-22'
- id: off_ina_107
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_107
  text: (3) Aliens who are subject to the numerical limitations of paragraph (1) shall
    be issued visas (or otherwise provided nonimmigrant status) in the order in which
    petitions are filed for such visas or status. If an alien who was issued a visa
    or otherwise provided nonimmigrant status and counted against the numerical limitations
    of paragraph (1) is found to have been issued such visa or otherwise provided
    such status by fraud or willfully misrepresenting a material fact and such visa
    or nonimmigrant status is revoked, then one number shall be restored to the total
    number of aliens who may be issued visas or otherwise provided such status under
    the numerical limitations of paragraph (1) in the fiscal year in which the petition
    is revoked, regardless of the fiscal year in which the petition was approved.
  retrieved_at: '2026-05-22'
- id: off_ina_108
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_108
  text: (4) In the case of a nonimmigrant described insection 1101(a)(15)(H)(i)(b)
    of this title, the period of authorized admission as such a nonimmigrant may not
    exceed 6 years.
  retrieved_at: '2026-05-22'
- id: off_ina_109
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_109
  text: (5) The numerical limitations contained in paragraph (1)(A) shall not apply
    to any nonimmigrant alien issued a visa or otherwise provided status undersection
    1101(a)(15)(H)(i)(b) of this titlewho-
  retrieved_at: '2026-05-22'
- id: off_ina_110
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_110
  text: (A) is employed (or has received an offer of employment) at an institution
    of higher education (as defined insection 1001(a) of title 20), or a related or
    affiliated nonprofit entity;
  retrieved_at: '2026-05-22'
- id: off_ina_111
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_111
  text: (B) is employed (or has received an offer of employment) at a nonprofit research
    organization or a governmental research organization; or
  retrieved_at: '2026-05-22'
- id: off_ina_112
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_112
  text: (C) has earned a master's or higher degree from a United States institution
    of higher education (as defined insection 1001(a) of title 20), until the number
    of aliens who are exempted from such numerical limitation during such year exceeds
    20,000.
  retrieved_at: '2026-05-22'
- id: off_ina_113
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_113
  text: (6) Any alien who ceases to be employed by an employer described in paragraph
    (5)(A) shall, if employed as a nonimmigrant alien described insection 1101(a)(15)(H)(i)(b)
    of this title, who has not previously been counted toward the numerical limitations
    contained in paragraph (1)(A), be counted toward those limitations the first time
    the alien is employed by an employer other than one described in paragraph (5).
  retrieved_at: '2026-05-22'
- id: off_ina_114
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_114
  text: (7) Any alien who has already been counted, within the 6 years prior to the
    approval of a petition described in subsection (c), toward the numerical limitations
    of paragraph (1)(A) shall not again be counted toward those limitations unless
    the alien would be eligible for a full 6 years of authorized admission at the
    time the petition is filed. Where multiple petitions are approved for 1 alien,
    that alien shall be counted only once.
  retrieved_at: '2026-05-22'
- id: off_ina_115
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_115
  text: (8)(A) The agreements referred to insection 1101(a)(15)(H)(i)(b1) of this
    titleare-
  retrieved_at: '2026-05-22'
- id: off_ina_116
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_116
  text: (B)(i) The Secretary of Homeland Security shall establish annual numerical
    limitations on approvals of initial applications by aliens for admission undersection
    1101(a)(15)(H)(i)(b1) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_117
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_117
  text: (I) 1,400 for nationals of Chile (as defined in article 14.9 of the United
    States-Chile Free Trade Agreement) for any fiscal year; and
  retrieved_at: '2026-05-22'
- id: off_ina_118
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_118
  text: (II) 5,400 for nationals of Singapore (as defined in Annex 1A of the United
    States-Singapore Free Trade Agreement) for any fiscal year.
  retrieved_at: '2026-05-22'
- id: off_ina_119
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_119
  text: (iii) The annual numerical limitations described in clause (i) shall only
    apply to principal aliens and not to the spouses or children of such aliens.
  retrieved_at: '2026-05-22'
- id: off_ina_120
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_120
  text: (iv) The annual numerical limitation described in paragraph (1)(A) is reduced
    by the amount of the annual numerical limitations established under clause (i).
    However, if a numerical limitation established under clause (i) has not been exhausted
    at the end of a given fiscal year, the Secretary of Homeland Security shall adjust
    upwards the numerical limitation in paragraph (1)(A) for that fiscal year by the
    amount remaining in the numerical limitation under clause (i). Visas undersection
    1101(a)(15)(H)(i)(b) of this titlemay be issued pursuant to such adjustment within
    the first 45 days of the next fiscal year to aliens who had applied for such visas
    during the fiscal year for which the adjustment was made.
  retrieved_at: '2026-05-22'
- id: off_ina_121
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_121
  text: (C) The period of authorized admission as a nonimmigrant undersection 1101(a)(15)(H)(i)(b1)
    of this titleshall be 1 year, and may be extended, but only in 1-year increments.
    After every second extension, the next following extension shall not be granted
    unless the Secretary of Labor had determined and certified to the Secretary of
    Homeland Security and the Secretary of State that the intending employer has filed
    with the Secretary of Labor an attestation undersection 1182(t)(1) of this titlefor
    the purpose of permitting the nonimmigrant to obtain such extension.
  retrieved_at: '2026-05-22'
- id: off_ina_122
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_122
  text: (D) The numerical limitation described in paragraph (1)(A) for a fiscal year
    shall be reduced by one for each alien granted an extension under subparagraph
    (C) during such year who has obtained 5 or more consecutive prior extensions.
  retrieved_at: '2026-05-22'
- id: off_ina_123
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_123
  text: (9)(A) Subject to subparagraphs (B) and (C), an alien who has already been
    counted toward the numerical limitation of paragraph (1)(B) during fiscal year
    2013, 2014, or 2015 shall not again be counted toward such limitation during fiscal
    year 2016. Such an alien shall be considered a returning worker.
  retrieved_at: '2026-05-22'
- id: off_ina_124
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_124
  text: (B) A petition to admit or otherwise provide status undersection 1101(a)(15)(H)(ii)(b)
    of this titleshall include, with respect to a returning worker-
  retrieved_at: '2026-05-22'
- id: off_ina_125
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_125
  text: (i) all information and evidence that the Secretary of Homeland Security determines
    is required to support a petition for status undersection 1101(a)(15)(H)(ii)(b)
    of this title;
  retrieved_at: '2026-05-22'
- id: off_ina_126
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_126
  text: (iii) a certification to the Department of Homeland Security that the alien
    is a returning worker.
  retrieved_at: '2026-05-22'
- id: off_ina_127
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_127
  text: (C) An H–2B visa or grant of nonimmigrant status for a returning worker shall
    be approved only if the alien is confirmed to be a returning worker by-
  retrieved_at: '2026-05-22'
- id: off_ina_128
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_128
  text: (ii) if the alien is visa exempt or seeking to change to status under section
    1101 (a)(15)(H)(ii)(b) of this title, the Department of Homeland Security.
  retrieved_at: '2026-05-22'
- id: off_ina_129
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_129
  text: (10) The numerical limitations of paragraph (1)(B) shall be allocated for
    a fiscal year so that the total number of aliens subject to such numerical limits
    who enter the United States pursuant to a visa or are accorded nonimmigrant status
    undersection 1101(a)(15)(H)(ii)(b) of this titleduring the first 6 months of such
    fiscal year is not more than 33,000.
  retrieved_at: '2026-05-22'
- id: off_ina_130
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_130
  text: (11)(A) The Secretary of State may not approve a number of initial applications
    submitted for aliens described insection 1101(a)(15)(E)(iii) of this titlethat
    is more than the applicable numerical limitation set out in this paragraph.
  retrieved_at: '2026-05-22'
- id: off_ina_131
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_131
  text: (B) The applicable numerical limitation referred to in subparagraph (A) is
    10,500 for each fiscal year.
  retrieved_at: '2026-05-22'
- id: off_ina_132
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_132
  text: (C) The applicable numerical limitation referred to in subparagraph (A) shall
    only apply to principal aliens and not to the spouses or children of such aliens.
  retrieved_at: '2026-05-22'
- id: off_ina_133
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_133
  text: The fact that an alien is the beneficiary of an application for a preference
    status filed undersection 1154 of this titleor has otherwise sought permanent
    residence in the United States shall not constitute evidence of an intention to
    abandon a foreign residence for purposes of obtaining a visa as a nonimmigrant
    described in subparagraph (H)(i)(b) or (c), (L), or (V) ofsection 1101(a)(15)
    of this titleor otherwise obtaining or maintaining the status of a nonimmigrant
    described in such subparagraph, if the alien had obtained a change of status undersection
    1258 of this titleto a classification as such a nonimmigrant before the alien's
    most recent departure from the United States.
  retrieved_at: '2026-05-22'
- id: off_ina_134
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_134
  text: (1) Except as provided in paragraph (3), for purposes ofsection 1101(a)(15)(H)(i)(b)
    of this title,section 1101(a)(15)(E)(iii) of this title, and paragraph (2), the
    term "specialty occupation" means an occupation that requires-
  retrieved_at: '2026-05-22'
- id: off_ina_135
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_135
  text: (A) theoretical and practical application of a body of highly specialized
    knowledge, and
  retrieved_at: '2026-05-22'
- id: off_ina_136
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_136
  text: (B) attainment of a bachelor's or higher degree in the specific specialty
    (or its equivalent) as a minimum for entry into the occupation in the United States.
  retrieved_at: '2026-05-22'
- id: off_ina_137
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_137
  text: (2) For purposes ofsection 1101(a)(15)(H)(i)(b) of this title, the requirements
    of this paragraph, with respect to a specialty occupation, are-
  retrieved_at: '2026-05-22'
- id: off_ina_138
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_138
  text: (A) full state licensure to practice in the occupation, if such licensure
    is required to practice in the occupation,
  retrieved_at: '2026-05-22'
- id: off_ina_139
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_139
  text: (B) completion of the degree described in paragraph (1)(B) for the occupation,
    or
  retrieved_at: '2026-05-22'
- id: off_ina_140
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_140
  text: (C)(i) experience in the specialty equivalent to the completion of such degree,
    and (ii) recognition of expertise in the specialty through progressively responsible
    positions relating to the specialty.
  retrieved_at: '2026-05-22'
- id: off_ina_141
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_141
  text: (3) For purposes ofsection 1101(a)(15)(H)(i)(b1) of this title, the term "specialty
    occupation" means an occupation that requires-
  retrieved_at: '2026-05-22'
- id: off_ina_142
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_142
  text: (A) theoretical and practical application of a body of specialized knowledge;
    and
  retrieved_at: '2026-05-22'
- id: off_ina_143
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_143
  text: (B) attainment of a bachelor's or higher degree in the specific specialty
    (or its equivalent) as a minimum for entry into the occupation in the United States.
  retrieved_at: '2026-05-22'
- id: off_ina_144
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_144
  text: (1) Notwithstanding any other provision of this chapter, an alien who is a
    citizen of Canada or Mexico who seeks to enter the United States under and pursuant
    to the provisions of Section B, Section C, or Section D of Annex 16–A of the USMCA
    (as defined insection 4502 of title 19), shall not be classified as a nonimmigrant
    under such provisions if there is in progress a strike or lockout in the course
    of a labor dispute in the occupational classification at the place or intended
    place of employment, unless such alien establishes, pursuant to regulations promulgated
    by the Attorney General, that the alien's entry will not affect adversely the
    settlement of the strike or lockout or the employment of any person who is involved
    in the strike or lockout. Notice of a determination under this paragraph shall
    be given as may be required by paragraph 3 of article 16.4 of the USMCA. For purposes
    of this paragraph, the term "citizen of Mexico" means "citizen" as defined in
    article 16.1 of the USMCA.
  retrieved_at: '2026-05-22'
- id: off_ina_145
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_145
  text: (2) Notwithstanding any other provision of this chapter exceptsection 1182(t)(1)
    of this title, and subject to regulations promulgated by the Secretary of Homeland
    Security, an alien who seeks to enter the United States under and pursuant to
    the provisions of an agreement listed in subsection (g)(8)(A), and the spouse
    and children of such an alien if accompanying or following to join the alien,
    may be denied admission as a nonimmigrant under subparagraph (E), (L), or (H)(i)(b1)
    ofsection 1101(a)(15) of this titleif there is in progress a labor dispute in
    the occupational classification at the place or intended place of employment,
    unless such alien establishes, pursuant to regulations promulgated by the Secretary
    of Homeland Security after consultation with the Secretary of Labor, that the
    alien's entry will not affect adversely the settlement of the labor dispute or
    the employment of any person who is involved in the labor dispute. Notice of a
    determination under this paragraph shall be given as may be required by such agreement.
  retrieved_at: '2026-05-22'
- id: off_ina_146
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_146
  text: (1) The number of aliens who may be provided a visa as nonimmigrants undersection
    1101(a)(15)(S)(i) of this titlein any fiscal year may not exceed 200. The number
    of aliens who may be provided a visa as nonimmigrants undersection 1101(a)(15)(S)(ii)
    of this titlein any fiscal year may not exceed 50.
  retrieved_at: '2026-05-22'
- id: off_ina_147
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_147
  text: (2) The period of admission of an alien as such a nonimmigrant may not exceed
    3 years. Such period may not be extended by the Attorney General.
  retrieved_at: '2026-05-22'
- id: off_ina_148
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_148
  text: (3) As a condition for the admission, and continued stay in lawful status,
    of such a nonimmigrant, the nonimmigrant-
  retrieved_at: '2026-05-22'
- id: off_ina_149
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_149
  text: (A) shall report not less often than quarterly to the Attorney General such
    information concerning the alien's whereabouts and activities as the Attorney
    General may require;
  retrieved_at: '2026-05-22'
- id: off_ina_150
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_150
  text: (B) may not be convicted of any criminal offense punishable by a term of imprisonment
    of 1 year or more after the date of such admission;
  retrieved_at: '2026-05-22'
- id: off_ina_151
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_151
  text: (C) must have executed a form that waives the nonimmigrant's right to contest,
    other than on the basis of an application for withholding of removal, any action
    for removal of the alien instituted before the alien obtains lawful permanent
    resident status; and
  retrieved_at: '2026-05-22'
- id: off_ina_152
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_152
  text: (D) shall abide by any other condition, limitation, or restriction imposed
    by the Attorney General.
  retrieved_at: '2026-05-22'
- id: off_ina_153
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_153
  text: (4) The Attorney General shall submit a report annually to the Committee on
    the Judiciary of the House of Representatives and the Committee on the Judiciary
    of the Senate concerning-
  retrieved_at: '2026-05-22'
- id: off_ina_154
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_154
  text: (B) the number of successful criminal prosecutions or investigations resulting
    from cooperation of such aliens;
  retrieved_at: '2026-05-22'
- id: off_ina_155
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_155
  text: (C) the number of terrorist acts prevented or frustrated resulting from cooperation
    of such aliens;
  retrieved_at: '2026-05-22'
- id: off_ina_156
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_156
  text: (D) the number of such nonimmigrants whose admission or cooperation has not
    resulted in successful criminal prosecution or investigation or the prevention
    or frustration of a terrorist act; and
  retrieved_at: '2026-05-22'
- id: off_ina_157
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_157
  text: (E) the number of such nonimmigrants who have failed to report quarterly (as
    required under paragraph (3)) or who have been convicted of crimes in the United
    States after the date of their admission as such a nonimmigrant.
  retrieved_at: '2026-05-22'
- id: off_ina_158
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_158
  text: (1) In the case of a request by an interested State agency, or by an interested
    Federal agency, for a waiver of the 2-year foreign residence requirement undersection
    1182(e) of this titleon behalf of an alien described in clause (iii) of such section,
    the Attorney General shall not grant such waiver unless-
  retrieved_at: '2026-05-22'
- id: off_ina_159
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_159
  text: (A) in the case of an alien who is otherwise contractually obligated to return
    to a foreign country, the government of such country furnishes the Director of
    the United States Information Agency with a statement in writing that it has no
    objection to such waiver;
  retrieved_at: '2026-05-22'
- id: off_ina_160
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_160
  text: (B) in the case of a request by an interested State agency, the grant of such
    waiver would not cause the number of waivers allotted for that State for that
    fiscal year to exceed 30;
  retrieved_at: '2026-05-22'
- id: off_ina_161
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_161
  text: (C) in the case of a request by an interested Federal agency or by an interested
    State agency-
  retrieved_at: '2026-05-22'
- id: off_ina_162
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_162
  text: (i) the alien demonstrates a bona fide offer of full-time employment at a
    health facility or health care organization, which employment has been determined
    by the Attorney General to be in the public interest; and
  retrieved_at: '2026-05-22'
- id: off_ina_163
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_163
  text: (ii) the alien agrees to begin employment with the health facility or health
    care organization within 90 days of receiving such waiver, and agrees to continue
    to work for a total of not less than 3 years (unless the Attorney General determines
    that extenuating circumstances exist, such as closure of the facility or hardship
    to the alien, which would justify a lesser period of employment at such health
    facility or health care organization, in which case the alien must demonstrate
    another bona fide offer of employment at a health facility or health care organization
    for the remainder of such 3-year period); and
  retrieved_at: '2026-05-22'
- id: off_ina_164
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_164
  text: (D) in the case of a request by an interested Federal agency (other than a
    request by an interested Federal agency to employ the alien full-time in medical
    research or training) or by an interested State agency, the alien agrees to practice
    primary care or specialty medicine in accordance with paragraph (2) for a total
    of not less than 3 years only in the geographic area or areas which are designated
    by the Secretary of Health and Human Services as having a shortage of health care
    professionals, except that-
  retrieved_at: '2026-05-22'
- id: off_ina_165
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_165
  text: (i) in the case of a request by the Department of Veterans Affairs, the alien
    shall not be required to practice medicine in a geographic area designated by
    the Secretary;
  retrieved_at: '2026-05-22'
- id: off_ina_166
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_166
  text: (ii) in the case of a request by an interested State agency, the head of such
    State agency determines that the alien is to practice medicine under such agreement
    in a facility that serves patients who reside in one or more geographic areas
    so designated by the Secretary of Health and Human Services (without regard to
    whether such facility is located within such a designated geographic area), and
    the grant of such waiver would not cause the number of the waivers granted on
    behalf of aliens for such State for a fiscal year (within the limitation in subparagraph
    (B)) in accordance with the conditions of this clause to exceed 10; and
  retrieved_at: '2026-05-22'
- id: off_ina_167
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_167
  text: (iii) in the case of a request by an interested Federal agency or by an interested
    State agency for a waiver for an alien who agrees to practice specialty medicine
    in a facility located in a geographic area so designated by the Secretary of Health
    and Human Services, the request shall demonstrate, based on criteria established
    by such agency, that there is a shortage of health care professionals able to
    provide services in the appropriate medical specialty to the patients who will
    be served by the alien.
  retrieved_at: '2026-05-22'
- id: off_ina_168
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_168
  text: (2)(A) Notwithstandingsection 1258(a)(2) of this title, the Attorney General
    may change the status of an alien who qualifies under this subsection andsection
    1182(e) of this titleto that of an alien described insection 1101(a)(15)(H)(i)(b)
    of this title. The numerical limitations contained in subsection (g)(1)(A) shall
    not apply to any alien whose status is changed under the preceding sentence, if
    the alien obtained a waiver of the 2-year foreign residence requirement upon a
    request by an interested Federal agency or an interested State agency.
  retrieved_at: '2026-05-22'
- id: off_ina_169
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_169
  text: (B) No person who has obtained a change of status under subparagraph (A) and
    who has failed to fulfill the terms of the contract with the health facility or
    health care organization named in the waiver application shall be eligible to
    apply for an immigrant visa, for permanent residence, or for any other change
    of nonimmigrant status, until it is established that such person has resided and
    been physically present in the country of his nationality or his last residence
    for an aggregate of at least 2 years following departure from the United States.
  retrieved_at: '2026-05-22'
- id: off_ina_170
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_170
  text: (3) Notwithstanding any other provision of this subsection, the 2-year foreign
    residence requirement undersection 1182(e) of this titleshall apply with respect
    to an alien described in clause (iii) of such section, who has not otherwise been
    accorded status undersection 1101(a)(27)(H) of this title, if-
  retrieved_at: '2026-05-22'
- id: off_ina_171
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_171
  text: (A) at any time the alien ceases to comply with any agreement entered into
    under subparagraph (C) or (D) of paragraph (1); or
  retrieved_at: '2026-05-22'
- id: off_ina_172
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_172
  text: (B) the alien's employment ceases to benefit the public interest at any time
    during the 3-year period described in paragraph (1)(C).
  retrieved_at: '2026-05-22'
- id: off_ina_173
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_173
  text: (1) An alien may not be accorded status as a nonimmigrant under clause (i)
    or (iii) ofsection 1101(a)(15)(F) of this titlein order to pursue a course of
    study-
  retrieved_at: '2026-05-22'
- id: off_ina_174
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_174
  text: (A) at a public elementary school or in a publicly funded adult education
    program; or
  retrieved_at: '2026-05-22'
- id: off_ina_175
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_175
  text: (i) the aggregate period of such status at such a school does not exceed 12
    months with respect to any alien, and (ii) the alien demonstrates that the alien
    has reimbursed the local educational agency that administers the school for the
    full, unsubsidized per capita cost of providing education at such school for the
    period of the alien's attendance.
  retrieved_at: '2026-05-22'
- id: off_ina_176
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_176
  text: (2) An alien who obtains the status of a nonimmigrant under clause (i) or
    (iii) ofsection 1101(a)(15)(F) of this titlein order to pursue a course of study
    at a private elementary or secondary school or in a language training program
    that is not publicly funded shall be considered to have violated such status,
    and the alien's visa undersection 1101(a)(15)(F) of this titleshall be void, if
    the alien terminates or abandons such course of study at such a school and undertakes
    a course of study at a public elementary school, in a publicly funded adult education
    program, in a publicly funded adult education language training program, or at
    a public secondary school (unless the requirements of paragraph (1)(B) are met).
  retrieved_at: '2026-05-22'
- id: off_ina_177
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_177
  text: (1) A nonimmigrant alien described in paragraph (2) who was previously issued
    a visa or otherwise provided nonimmigrant status undersection 1101(a)(15)(H)(i)(b)
    of this titleis authorized to accept new employment upon the filing by the prospective
    employer of a new petition on behalf of such nonimmigrant as provided under subsection
    (a). Employment authorization shall continue for such alien until the new petition
    is adjudicated. If the new petition is denied, such authorization shall cease.
  retrieved_at: '2026-05-22'
- id: off_ina_178
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_178
  text: (B) on whose behalf an employer has filed a nonfrivolous petition for new
    employment before the date of expiration of the period of stay authorized by the
    Attorney General; and
  retrieved_at: '2026-05-22'
- id: off_ina_179
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_179
  text: (C) who, subsequent to such lawful admission, has not been employed without
    authorization in the United States before the filing of such petition.
  retrieved_at: '2026-05-22'
- id: off_ina_180
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_180
  text: (1) No alien shall be eligible for admission to the United States undersection
    1101(a)(15)(T) of this titleif there is substantial reason to believe that the
    alien has committed an act of a severe form of trafficking in persons (as defined
    insection 7102 of title 22).
  retrieved_at: '2026-05-22'
- id: off_ina_181
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_181
  text: (2) The total number of aliens who may be issued visas or otherwise provided
    nonimmigrant status during any fiscal year undersection 1101(a)(15)(T) of this
    titlemay not exceed 5,000.
  retrieved_at: '2026-05-22'
- id: off_ina_182
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_182
  text: (3) The numerical limitation of paragraph (2) shall only apply to principal
    aliens and not to the spouses, sons, daughters, siblings, or parents of such aliens.
  retrieved_at: '2026-05-22'
- id: off_ina_183
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_183
  text: (4) An unmarried alien who seeks to accompany, or follow to join, a parent
    granted status undersection 1101(a)(15)(T)(i) of this title, and who was under
    21 years of age on the date on which such parent applied for such status, shall
    continue to be classified as a child for purposes ofsection 1101(a)(15)(T)(ii)
    of this title, if the alien attains 21 years of age after such parent's application
    was filed but while it was pending.
  retrieved_at: '2026-05-22'
- id: off_ina_184
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_184
  text: (5) An alien described in clause (i) ofsection 1101(a)(15)(T) of this titleshall
    continue to be treated as an alien described in clause (ii)(I) of such section
    if the alien attains 21 years of age after the alien's application for status
    under such clause (i) is filed but while it is pending.
  retrieved_at: '2026-05-22'
- id: off_ina_185
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_185
  text: (6) In making a determination under section 1101(a)(15)(T)(i)(III)(aa) with
    respect to an alien, statements from State and local law enforcement officials
    that the alien has complied with any reasonable request for assistance in the
    investigation or prosecution of crimes such as kidnapping, rape, slavery, or other
    forced labor offenses, where severe forms of trafficking in persons (as defined
    insection 7102 of title 22) appear to have been involved, shall be considered.
  retrieved_at: '2026-05-22'
- id: off_ina_186
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_186
  text: (7)(A) Except as provided in subparagraph (B), an alien who is issued a visa
    or otherwise provided nonimmigrant status undersection 1101(a)(15)(T) of this
    titlemay be granted such status for a period of not more than 4 years.
  retrieved_at: '2026-05-22'
- id: off_ina_187
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_187
  text: (B) An alien who is issued a visa or otherwise provided nonimmigrant status
    undersection 1101(a)(15)(T) of this titlemay extend the period of such status
    beyond the period described in subparagraph (A) if-
  retrieved_at: '2026-05-22'
- id: off_ina_188
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_188
  text: (i) a Federal, State, or local law enforcement official, prosecutor, judge,
    or other authority investigating or prosecuting activity relating to human trafficking
    or certifies that the presence of the alien in the United States is necessary
    to assist in the investigation or prosecution of such activity;
  retrieved_at: '2026-05-22'
- id: off_ina_189
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_189
  text: (ii) the alien is eligible for relief undersection 1255(l) of this titleand
    is unable to obtain such relief because regulations have not been issued to implement
    such section; or
  retrieved_at: '2026-05-22'
- id: off_ina_190
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_190
  text: (iii) the Secretary of Homeland Security determines that an extension of the
    period of such nonimmigrant status is warranted due to exceptional circumstances.
  retrieved_at: '2026-05-22'
- id: off_ina_191
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_191
  text: (C) Nonimmigrant status undersection 1101(a)(15)(T) of this titleshall be
    extended during the pendency of an application for adjustment of status undersection
    1255(l) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_192
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_192
  text: The petition filed by an alien undersection 1101(a)(15)(U)(i) of this titleshall
    contain a certification from a Federal, State, or local law enforcement official,
    prosecutor, judge, or other Federal, State, or local authority investigating criminal
    activity described insection 1101(a)(15)(U)(iii) of this title. This certification
    may also be provided by an official of the Service whose ability to provide such
    certification is not limited to information concerning immigration violations.
    This certification shall state that the alien "has been helpful, is being helpful,
    or is likely to be helpful" in the investigation or prosecution of criminal activity
    described insection 1101(a)(15)(U)(iii) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_193
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_193
  text: (A) The number of aliens who may be issued visas or otherwise provided status
    as nonimmigrants undersection 1101(a)(15)(U) of this titlein any fiscal year shall
    not exceed 10,000.
  retrieved_at: '2026-05-22'
- id: off_ina_194
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_194
  text: (B) The numerical limitations in subparagraph (A) shall only apply to principal
    aliens described insection 1101(a)(15)(U)(i) of this title, and not to spouses,
    children, or, in the case of alien children, the alien parents of such children.
  retrieved_at: '2026-05-22'
- id: off_ina_195
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_195
  text: With respect to nonimmigrant aliens described in subsection (a)(15)(U) ofsection
    1101 of this title-
  retrieved_at: '2026-05-22'
- id: off_ina_196
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_196
  text: (A) the Attorney General and other government officials, where appropriate,
    shall provide those aliens with referrals to nongovernmental organizations to
    advise the aliens regarding their options while in the United States and the resources
    available to them; and
  retrieved_at: '2026-05-22'
- id: off_ina_197
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_197
  text: (B) the Attorney General shall, during the period those aliens are in lawful
    temporary resident status under that subsection, provide the aliens with employment
    authorization.
  retrieved_at: '2026-05-22'
- id: off_ina_198
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_198
  text: In acting on any petition filed under this subsection, the consular officer
    or the Attorney General, as appropriate, shall consider any credible evidence
    relevant to the petition.
  retrieved_at: '2026-05-22'
- id: off_ina_199
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_199
  text: Nothing in this subsection limits the ability of aliens who qualify for status
    undersection 1101(a)(15)(U) of this titleto seek any other immigration benefit
    or status for which the alien may be eligible.
  retrieved_at: '2026-05-22'
- id: off_ina_200
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_200
  text: The authorized period of status of an alien as a nonimmigrant undersection
    1101(a)(15)(U) of this titleshall be for a period of not more than 4 years, but
    shall be extended upon certification from a Federal, State, or local law enforcement
    official, prosecutor, judge, or other Federal, State, or local authority investigating
    or prosecuting criminal activity described insection 1101(a)(15)(U)(iii) of this
    titlethat the alien's presence in the United States is required to assist in the
    investigation or prosecution of such criminal activity. The Secretary of Homeland
    Security may extend, beyond the 4-year period authorized under this section, the
    authorized period of status of an alien as a nonimmigrant undersection 1101(a)(15)(U)
    of this titleif the Secretary determines that an extension of such period is warranted
    due to exceptional circumstances. Such alien's nonimmigrant status shall be extended
    beyond the 4-year period authorized under this section if the alien is eligible
    for relief undersection 1255(m) of this titleand is unable to obtain such relief
    because regulations have not been issued to implement such section and shall be
    extended during the pendency of an application for adjustment of status undersection
    1255(m) of this title. The Secretary may grant work authorization to any alien
    who has a pending, bona fide application for nonimmigrant status undersection
    1101(a)(15)(U) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_201
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_201
  text: An unmarried alien who seeks to accompany, or follow to join, a parent granted
    status undersection 1101(a)(15)(U)(i) of this title, and who was under 21 years
    of age on the date on which such parent petitioned for such status, shall continue
    to be classified as a child for purposes ofsection 1101(a)(15)(U)(ii) of this
    title, if the alien attains 21 years of age after such parent's petition was filed
    but while it was pending.
  retrieved_at: '2026-05-22'
- id: off_ina_202
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_202
  text: An alien described in clause (i) ofsection 1101(a)(15)(U) of this titleshall
    continue to be treated as an alien described in clause (ii)(I) of such section
    if the alien attains 21 years of age after the alien's application for status
    under such clause (i) is filed but while it is pending.
  retrieved_at: '2026-05-22'
- id: off_ina_203
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_203
  text: (1) In the case of a nonimmigrant described insection 1101(a)(15)(V) of this
    title-
  retrieved_at: '2026-05-22'
- id: off_ina_204
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_204
  text: (A) the Attorney General shall authorize the alien to engage in employment
    in the United States during the period of authorized admission and shall provide
    the alien with an "employment authorized" endorsement or other appropriate document
    signifying authorization of employment; and
  retrieved_at: '2026-05-22'
- id: off_ina_205
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_205
  text: '(B) the period of authorized admission as such a nonimmigrant shall terminate
    30 days after the date on which any of the following is denied:'
  retrieved_at: '2026-05-22'
- id: off_ina_206
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_206
  text: (i) The petition filed undersection 1154 of this titleto accord the alien
    a status undersection 1153(a)(2)(A) of this title(or, in the case of a child granted
    nonimmigrant status based on eligibility to receive a visa undersection 1153(d)
    of this title, the petition filed to accord the child's parent a status undersection
    1153(a)(2)(A) of this title).
  retrieved_at: '2026-05-22'
- id: off_ina_207
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_207
  text: (ii) The alien's application for an immigrant visa pursuant to the approval
    of such petition.
  retrieved_at: '2026-05-22'
- id: off_ina_208
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_208
  text: (iii) The alien's application for adjustment of status undersection 1255 of
    this titlepursuant to the approval of such petition.
  retrieved_at: '2026-05-22'
- id: off_ina_209
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_209
  text: (2) In determining whether an alien is eligible to be admitted to the United
    States as a nonimmigrant undersection 1101(a)(15)(V) of this title, the grounds
    for inadmissibility specified insection 1182(a)(9)(B) of this titleshall not apply.
  retrieved_at: '2026-05-22'
- id: off_ina_210
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_210
  text: (3) The status of an alien physically present in the United States may be
    adjusted by the Attorney General, in the discretion of the Attorney General and
    under such regulations as the Attorney General may prescribe, to that of a nonimmigrant
    undersection 1101(a)(15)(V) of this title, if the alien-
  retrieved_at: '2026-05-22'
- id: off_ina_211
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_211
  text: (C) is eligible to be admitted to the United States, except in determining
    such admissibility, the grounds for inadmissibility specified in paragraphs (6)(A),
    (7), and (9)(B) ofsection 1182(a) of this titleshall not apply.
  retrieved_at: '2026-05-22'
- id: off_ina_212
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_212
  text: (1) A visa shall not be issued under the provisions ofsection 1101(a)(15)(K)(ii)
    of this titleuntil the consular officer has received a petition filed in the United
    States by the spouse of the applying alien and approved by the Attorney General.
    The petition shall be in such form and contain such information as the Attorney
    General shall, by regulation, prescribe. Such information shall include information
    on any criminal convictions of the petitioner for any specified crime described
    in paragraph (5)(B) and information on any permanent protection or restraining
    order issued against the petitioner related to any specified crime described in
    subsection3(5)(B)(i).
  retrieved_at: '2026-05-22'
- id: off_ina_213
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_213
  text: (2) In the case of an alien seeking admission undersection 1101(a)(15)(K)(ii)
    of this titlewho concluded a marriage with a citizen of the United States outside
    the United States, the alien shall be considered inadmissible undersection 1182(a)(7)(B)
    of this titleif the alien is not at the time of application for admission in possession
    of a valid nonimmigrant visa issued by a consular officer in the foreign state
    in which the marriage was concluded.
  retrieved_at: '2026-05-22'
- id: off_ina_214
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_214
  text: '(3) In the case of a nonimmigrant described insection 1101(a)(15)(K)(ii)
    of this title, and any child of such a nonimmigrant who was admitted as accompanying,
    or following to join, such a nonimmigrant, the period of authorized admission
    shall terminate 30 days after the date on which any of the following is denied:'
  retrieved_at: '2026-05-22'
- id: off_ina_215
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_215
  text: (A) The petition filed undersection 1154 of this titleto accord the principal
    alien status undersection 1151(b)(2)(A)(i) of this title.
  retrieved_at: '2026-05-22'
- id: off_ina_216
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_216
  text: (B) The principal alien's application for an immigrant visa pursuant to the
    approval of such petition.
  retrieved_at: '2026-05-22'
- id: off_ina_217
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_217
  text: (C) The principal alien's application for adjustment of status undersection
    1255 of this titlepursuant to the approval of such petition.
  retrieved_at: '2026-05-22'
- id: off_ina_218
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_218
  text: (4)(A) The Secretary of Homeland Security shall create a database for the
    purpose of tracking multiple visa petitions filed for fiancé(e)s and spouses under
    clauses (i) and (ii) ofsection 1101(a)(15)(K) of this title. Upon approval of
    a second visa petition undersection 1101(a)(15)(K) of this titlefor a fiancé(e)
    or spouse filed by the same United States citizen petitioner, the petitioner shall
    be notified by the Secretary that information concerning the petitioner has been
    entered into the multiple visa petition tracking database. All subsequent fiancé(e)
    or spouse nonimmigrant visa petitions filed by that petitioner under such section
    shall be entered in the database.
  retrieved_at: '2026-05-22'
- id: off_ina_219
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_219
  text: (B)(i) Once a petitioner has had two fiancé(e) or spousal petitions approved
    under clause (i) or (ii) ofsection 1101(a)(15)(K) of this title, if a subsequent
    petition is filed under such section less than 10 years after the date the first
    visa petition was filed under such section, the Secretary of Homeland Security
    shall notify both the petitioner and beneficiary of any such subsequent petition
    about the number of previously approved fiancé(e) or spousal petitions listed
    in the database.
  retrieved_at: '2026-05-22'
- id: off_ina_220
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_220
  text: (ii) To notify the beneficiary as required by clause (i), the Secretary of
    Homeland Security shall provide such notice to the Secretary of State for inclusion
    in the mailing to the beneficiary described insection 1375a(a)(5)(A)(i) of this
    title.
  retrieved_at: '2026-05-22'
- id: off_ina_221
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_221
  text: (A) The terms "domestic violence", "sexual assault", "child abuse and neglect",
    "dating violence", "elder abuse", and "stalking" have the meaning given such terms
    in section 3 of the Violence Against Women and Department of Justice Reauthorization
    Act of 2005.1
  retrieved_at: '2026-05-22'
- id: off_ina_222
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_222
  text: (i) Domestic violence, sexual assault, child abuse and neglect, dating violence,
    elder abuse, stalking, or an attempt to commit any such crime.
  retrieved_at: '2026-05-22'
- id: off_ina_223
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_223
  text: (ii) Homicide, murder, manslaughter, rape, abusive sexual contact, sexual
    exploitation, incest, torture, trafficking, peonage, holding hostage, involuntary
    servitude, slave trade, kidnapping, abduction, unlawful criminal restraint, false
    imprisonment, or an attempt to commit any of the crimes described in this clause.
  retrieved_at: '2026-05-22'
- id: off_ina_224
  source: ina_214b
  source_url: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1184&num=0&edition=prelim
  section: ''
  paragraph_anchor: p_224
  text: (iii) At least three convictions for crimes relating to a controlled substance
    or alcohol not arising from a single act.
  retrieved_at: '2026-05-22'
