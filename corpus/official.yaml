  text: "b.(U) Employment-Based Preference\r\nPetitions for Eligibility:� DHS/USCIS\
    \ will not approve an\r\nemployment-based preference petition on behalf of an\
    \ FMG unless it has\r\nestablished that the beneficiary is not ineligible under\
    \ INA 212(a)(5)(B).� All\r\nsuch petitions are supposed to bear a notation signifying\
    \ that this determination\r\nhas been made.� Approved employment-based preference\
    \ petitions on behalf of\r\nFMGs that bear the appropriate notation should be\
    \ given the same credence as\r\nany other approved petition and should be questioned\
    \ only as provided for in9 FAM 504.2.� An employment-based preference petition\
    \ approved on behalf of an\r\nFMG that does not bear the appropriate notation\
    \ should be returned to the\r\napproving office of USCIS with a request that the\
    \ question be addressed and\r\nthat the petition be appropriately annotated.�"
  retrieved_at: '2026-05-22'
